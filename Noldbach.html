<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شرح خوارزمية Noldbach (Sieve of Eratosthenes)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; font-size: 14px; }
        #root { height: 100%; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .crossed-out {
            position: relative;
        }
        .crossed-out::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 2px;
            background-color: #e11d48; /* rose-600 */
            transform: rotate(-45deg);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function generateSteps() {
            let steps = [];
            const N = 15; // Limit for visualizer

            // Helper to copy state
            const cloneState = (phase, arr, primesList, pairIdx = -1, testVal = null, isValid = null, count = 0) => ({
                phase,
                grid: [...arr],
                primes: [...primesList],
                pairIdx,
                testVal,
                isValid,
                count
            });

            // State array for sieve: null=unprocessed, true=prime, false=crossed
            let grid = Array(N + 1).fill(null);
            grid[0] = false;
            grid[1] = false;

            steps.push({
                happened: "بدأ البرنامج. نأخذ كمثال N=15. سنقوم أولاً بإنشاء مصفوفة 'غربال إراتوستينس' للبحث عن الأعداد الأولية.",
                next: "سنقوم بشطب (استبعاد) الرقمين 0 و 1 لأنهما قطعا ليسا أعداداً أولية.",
                state: cloneState('sieve', grid, [])
            });

            // Sieve of Eratosthenes logic for Steps
            steps.push({
                happened: "تم استبعاد الرقمين 0 و 1.",
                next: "سنبدأ بالمرور على الأرقام من 2 فصاعداً. إذا وجدنا رقماً لم يُشطب، نعتبره أولياً ونشطب كل مضاعفاته.",
                state: cloneState('sieve', grid, [])
            });

            // i = 2
            grid[2] = true;
            steps.push({
                happened: "الرقم 2 لم يُشطب. إذن 2 هو عدد أولي!",
                next: "سنقوم الآن بشطب جميع مضاعفات الرقم 2 (4, 6, 8, 10, 12, 14).",
                state: cloneState('sieve', grid, [])
            });

            for(let j = 4; j <= N; j+=2) grid[j] = false;
            steps.push({
                happened: "تم شطب كل مضاعفات الرقم 2 بضربة واحدة. هذه هي قوة الخوارزمية!",
                next: "ننتقل للرقم التالي (3).",
                state: cloneState('sieve', grid, [])
            });

            // i = 3
            grid[3] = true;
            steps.push({
                happened: "الرقم 3 لم يُشطب. إذن 3 هو عدد أولي!",
                next: "سنقوم بشطب مضاعفاته (6 مشطوب مسبقاً، نشطب 9، 12 مشطوب، نشطب 15).",
                state: cloneState('sieve', grid, [])
            });

            for(let j = 9; j <= N; j+=3) grid[j] = false;
            steps.push({
                happened: "تم شطب مضاعفات الـ 3 (الأرقام 9 و 15).",
                next: "نكمل البحث.. الأرقام 5, 7, 11, 13 كلها لم تشطب، مضاعفاتها تتجاوز الـ 15.",
                state: cloneState('sieve', grid, [])
            });

            // Fill rest
            [5,7,11,13].forEach(p => grid[p] = true);
            let primes = [2, 3, 5, 7, 11, 13];
            
            steps.push({
                happened: "انتهى عمل الغربال. الأرقام الملونة بالأخضر هي الأعداد الأولية.",
                next: "الآن سنقوم بجمعها في قائمة (مصفوفة) لنستخدمها في فحص نظرية نولدباخ.",
                state: cloneState('extract', grid, [])
            });

            steps.push({
                happened: "تم جمع الأعداد الأولية في قائمة [2, 3, 5, 7, 11, 13].",
                next: "الآن سنأخذ كل رقمين أوليين متجاورين، ونطبق المعادلة (الأول + الثاني + 1) لنرى إن كان الناتج عدداً أولياً.",
                state: cloneState('test', grid, primes)
            });

            // Testing Noldbach combinations
            let count = 0;
            // pair 0: 2, 3
            let sum1 = 2 + 3 + 1; // 6
            steps.push({
                happened: "أخذنا الزوج الأول: (2, 3). المعادلة: 2 + 3 + 1 = 6.",
                next: "سنسأل الغربال: هل 6 عدد أولي؟ (لا، هو مشطوب).",
                state: cloneState('test', grid, primes, 0, sum1, null, count)
            });
            steps.push({
                happened: "الناتج 6 ليس أولياً. فشل الشرط ولن نزيد العداد.",
                next: "ننتقل للزوج المتجاور التالي: (3, 5).",
                state: cloneState('test', grid, primes, 0, sum1, false, count)
            });

            // pair 1: 3, 5
            let sum2 = 3 + 5 + 1; // 9
            steps.push({
                happened: "الزوج الثاني: (3, 5). المعادلة: 3 + 5 + 1 = 9.",
                next: "نسأل الغربال: هل 9 عدد أولي؟ (لا).",
                state: cloneState('test', grid, primes, 1, sum2, null, count)
            });
            steps.push({
                happened: "الناتج 9 ليس أولياً. فشل الشرط.",
                next: "ننتقل للزوج التالي: (5, 7).",
                state: cloneState('test', grid, primes, 1, sum2, false, count)
            });

            // pair 2: 5, 7
            let sum3 = 5 + 7 + 1; // 13
            steps.push({
                happened: "الزوج الثالث: (5, 7). المعادلة: 5 + 7 + 1 = 13.",
                next: "نسأل الغربال: هل 13 عدد أولي؟ (نعم!).",
                state: cloneState('test', grid, primes, 2, sum3, null, count)
            });
            count++;
            steps.push({
                happened: "الناتج 13 عدد أولي! تحقق الشرط، نزيد العداد بواحد.",
                next: "ننتقل للزوج التالي: (7, 11).",
                state: cloneState('test', grid, primes, 2, sum3, true, count)
            });

            // pair 3: 7, 11
            let sum4 = 7 + 11 + 1; // 19
            steps.push({
                happened: "الزوج الأخير في نطاقنا البصري: (7, 11). المعادلة: 7 + 11 + 1 = 19. (19 عدد أولي).",
                next: "تحقق الشرط، نزيد العداد. هكذا يعمل الكود حتى ينهي القائمة.",
                state: cloneState('test', grid, primes, 3, sum4, true, count + 1)
            });

            steps.push({
                happened: `انتهى البحث! وجدنا ${count+1} أعداد تحقق نظرية نولدباخ في هذا النطاق الصغير.`,
                next: "يتم مقارنة العداد بالرقم (K) المدخل وطباعة YES أو NO. انتهى التتبع البصري.",
                state: cloneState('done', grid, primes, -1, null, null, count + 1)
            });

            return steps;
        }

        function App() {
            const [activeTab, setActiveTab] = useState('problem'); 
            const stepsRef = useRef(generateSteps());
            const [stepIdx, setStepIdx] = useState(0);

            const renderProblem = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">نص المسألة (Noldbach)</h2>
                            
                            <div className="text-sm space-y-4 text-slate-700 leading-relaxed">
                                <p className="font-semibold bg-slate-100 p-4 rounded border border-slate-200 shadow-inner">
                                    ينص Noldbach على أن هناك على الأقل <span dir="ltr" className="font-mono text-indigo-700 mx-1">K</span> عدداً أولياً في النطاق من <span dir="ltr" className="font-mono mx-1">2</span> إلى <span dir="ltr" className="font-mono mx-1">N</span> (شاملاً) يمكن التعبير عنه كـ: 
                                    <br/><strong>مجموع عددين أوليين متجاورين + 1</strong>.
                                    <br/><br/>
                                    <span className="text-xs text-indigo-700">مثال:</span> 13 هو عدد أولي يمكن تكوينه من الأوليين المتجاورين (5 و 7) زائد واحد (5 + 7 + 1 = 13).
                                </p>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                    <div className="bg-slate-50 p-4 rounded border border-slate-200">
                                        <h3 className="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">المدخلات (Input)</h3>
                                        <ul className="list-disc list-inside space-y-1 text-xs">
                                            <li>سطر واحد يحتوي على عددين صحيحين <code className="font-mono">N</code> و <code className="font-mono">K</code>.</li>
                                        </ul>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded border border-slate-200">
                                        <h3 className="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">المخرجات (Output)</h3>
                                        <ul className="list-disc list-inside space-y-1 text-xs">
                                            <li>اطبع <code className="font-mono">YES</code> إذا كان عدد الأعداد التي تحقق الشرط أكبر أو يساوي <code className="font-mono">K</code>.</li>
                                            <li>وإلا اطبع <code className="font-mono">NO</code>.</li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row gap-4 mt-4">
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Example Input</div>
                                        <div>27 2 <span className="text-slate-500 text-[10px] ml-2">// N=27, K=2</span></div>
                                    </div>
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Expected Output</div>
                                        <div className="text-emerald-400">YES</div>
                                        <div className="mt-2 text-slate-500 text-[10px] whitespace-pre-wrap">
                                            // The primes up to 27 are: 
                                            // 2, 3, 5, 7, 11, 13, 17, 19, 23
                                            // 5 + 7 + 1 = 13 (Valid, is prime)
                                            // 7 + 11 + 1 = 19 (Valid, is prime)
                                            // We found 2 valid primes, which is >= K.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderDataStructures = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">فهم غربال إراتوستينس (Sieve of Eratosthenes)</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-3">
                                    <h3 className="text-sm font-bold text-slate-700 bg-slate-200 p-2 rounded">كيف نجد الأعداد الأولية؟</h3>
                                    <p className="text-xs text-slate-700 leading-relaxed">
                                        لو قمنا بفحص كل رقم على حدة باستخدام حلقة تكرار عادية (من 2 إلى جذر الرقم)، سيستغرق ذلك وقتاً طويلاً جداً إذا كان <code dir="ltr" className="font-mono mx-1">N</code> كبيراً.
                                        بدلاً من ذلك، نستخدم خدعة الغربال القديمة (Sieve): 
                                        نفترض أولاً أن <strong>كل الأرقام أولية</strong>، ثم نبدأ بشطب المضاعفات.
                                    </p>
                                    <div className="bg-rose-50 border border-rose-200 p-3 rounded text-xs text-rose-800 shadow-sm">
                                        <strong className="block mb-1 text-rose-900">مثال الغربلة:</strong>
                                        نقف عند الرقم 2 (أولي)، ونشطب كل مضاعفاته: 4، 6، 8، 10... <br/>
                                        نقف عند الرقم 3 (أولي)، ونشطب مضاعفاته: 9، 15، 21... (الـ 6 مشطوب سلفاً).<br/>
                                        هذه الطريقة فائقة السرعة!
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-sm font-bold text-slate-700 bg-emerald-100 p-2 rounded">المعطيات والمستنتجات في الكود</h3>
                                    <p className="text-xs text-slate-700 leading-relaxed">
                                        للتعامل مع الغربال برمجياً، نستخدم مصفوفتين أساسيتين تم إعدادهما في الكود:
                                    </p>
                                    <ul className="list-disc list-inside text-xs space-y-2 text-slate-600 bg-white border border-slate-200 p-3 rounded">
                                        <li>
                                            <code dir="ltr" className="font-mono text-indigo-700 font-bold bg-slate-50 px-1 border rounded mx-1">is_prime</code>
                                            مصفوفة منطقية (Boolean). قيمتها <code className="font-mono">true</code> تعني أن الرقم أولي، و <code className="font-mono">false</code> تعني أنه مشطوب (مركب).
                                        </li>
                                        <li>
                                            <code dir="ltr" className="font-mono text-indigo-700 font-bold bg-slate-50 px-1 border rounded mx-1">primes</code>
                                            قائمة (Vector) فارغة في البداية. بعد انتهاء الغربلة، نقوم بجمع كل الأرقام التي ظلت <code className="font-mono">true</code> في هذه القائمة، لنحصل على الأعداد الأولية مرتبة ومتجاورة لسهولة الفحص لاحقاً.
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderStrategy = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-6">
                        <div className="bg-white p-6 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2 flex items-center gap-2">
                                <i className="fa-solid fa-chess-knight"></i> استراتيجية الحل
                            </h2>
                            <p className="text-sm text-slate-600 mb-6">الحل مقسم إلى 3 مراحل منطقية ومتسلسلة:</p>
                            
                            <div className="space-y-5 text-sm text-slate-700 leading-relaxed">
                                
                                <div className="bg-blue-50/50 p-4 rounded border border-blue-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
                                    <h3 className="font-bold text-blue-900 mb-2">المرحلة الأولى: بناء الغربال المسبق (Pre-computation)</h3>
                                    <p className="mb-2 text-xs">ننشئ مصفوفة <code dir="ltr" className="font-mono mx-1">is_prime</code> حتى الحد الأقصى الممكن <code dir="ltr" className="font-mono mx-1">MAX_N</code>. يتم تنفيذ حلقتي تكرار (Loops) لشطب المضاعفات. الجميل هنا أننا نبدأ شطب مضاعفات الرقم <code dir="ltr" className="font-mono mx-1">i</code> من <code dir="ltr" className="font-mono mx-1">i * i</code> لتوفير الوقت (لأن الأصغر تم شطبها بواسطة أرقام سابقة).</p>
                                </div>

                                <div className="bg-purple-50/50 p-4 rounded border border-purple-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-purple-400"></div>
                                    <h3 className="font-bold text-purple-900 mb-2">المرحلة الثانية: استخراج الأعداد الأولية</h3>
                                    <p className="mb-2 text-xs">بعد تجهيز الغربال، نمر من 2 إلى <code dir="ltr" className="font-mono mx-1">N</code>، وأي رقم نجده <code dir="ltr" className="font-mono mx-1">is_prime[i] == true</code>، نقوم بإضافته إلى القائمة <code dir="ltr" className="font-mono mx-1">primes</code>. هذا يضمن لنا أن القائمة تحتوي على الأعداد الأولية متجاورة بالترتيب.</p>
                                </div>

                                <div className="bg-emerald-50/50 p-4 rounded border border-emerald-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-emerald-400"></div>
                                    <h3 className="font-bold text-emerald-900 mb-2">المرحلة الثالثة: فحص أزواج نولدباخ (Testing Pairs)</h3>
                                    <p className="mb-2 text-xs">نمر على قائمة الأعداد الأولية عنصراً بعنصر ونطبق المعادلة:</p>
                                    <div className="bg-white p-3 rounded border border-emerald-200 text-xs font-mono text-center shadow-sm" dir="ltr">
                                        if (is_prime[ primes[i] + primes[i-1] + 1 ]) count++;
                                    </div>
                                    <p className="mt-3 text-[11px] text-emerald-800 font-semibold bg-emerald-100/50 p-2 rounded">
                                        * ملاحظة: الكود يتحقق من المصفوفة <code>is_prime</code> للناتج فوراً. وبما أن المصفوفة مبنية حتى <code>MAX_N</code>، فهذا الاستعلام سريع جداً ولا يستغرق سوى خطوة واحدة <code dir="ltr" className="font-mono mx-1">O(1)</code>!
                                    </p>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderVisualizer = () => {
                const s = stepsRef.current[stepIdx].state;
                const currentStepInfo = stepsRef.current[stepIdx];

                return (
                    <div className="flex flex-col lg:flex-row h-full bg-slate-100 fade-in overflow-hidden">
                        
                        {/* Control Panel */}
                        <div className="w-full lg:w-1/3 bg-white border-l border-slate-200 shadow-lg z-20 flex flex-col">
                            <div className="p-3 bg-slate-800 text-white border-b border-slate-700">
                                <h2 className="text-sm font-bold">التتبع البصري (الغربال والفحص)</h2>
                                <p className="text-[10px] text-slate-400">انقر لاستكشاف بناء الغربال ثم تطبيق المعادلة.</p>
                            </div>
                            
                            <div className="p-4 flex-1 overflow-y-auto space-y-4">
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-slate-800 mb-1 border-b border-slate-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-check-circle text-emerald-600"></i> ماذا حدث للتو؟
                                    </h3>
                                    <p className="text-xs text-slate-700 leading-relaxed mt-2">{currentStepInfo.happened}</p>
                                </div>

                                <div className="bg-indigo-50 border border-indigo-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-indigo-900 mb-1 border-b border-indigo-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left text-indigo-600"></i> ماذا سيحدث الآن؟
                                    </h3>
                                    <p className="text-xs text-indigo-800 leading-relaxed mt-2">{currentStepInfo.next}</p>
                                </div>
                            </div>

                            <div className="p-4 bg-slate-50 border-t border-slate-200">
                                <button 
                                    onClick={() => setStepIdx(Math.min(stepsRef.current.length - 1, stepIdx + 1))} 
                                    disabled={stepIdx === stepsRef.current.length - 1}
                                    className="w-full py-3 rounded bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold text-sm shadow transition flex items-center justify-center gap-2"
                                >
                                    {stepIdx === stepsRef.current.length - 1 ? 'انتهى التنفيذ' : 'تنفيذ الخطوة التالية'}
                                    {stepIdx < stepsRef.current.length - 1 && <i className="fa-solid fa-play text-xs"></i>}
                                </button>
                                
                                <div className="flex justify-between mt-3">
                                    <button onClick={() => setStepIdx(0)} disabled={stepIdx === 0} className="text-xs text-slate-500 hover:text-slate-800 transition disabled:opacity-50 flex items-center gap-1">
                                        <i className="fa-solid fa-rotate-right"></i> إعادة من البداية
                                    </button>
                                    <span className="text-xs font-mono text-slate-400 bg-slate-200 px-2 py-0.5 rounded">
                                        خطوة {stepIdx + 1} / {stepsRef.current.length}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Visual Area */}
                        <div className="flex-1 p-4 flex flex-col items-center justify-start bg-slate-100 overflow-y-auto relative" dir="ltr">
                            
                            {/* Grid View (Sieve Array) */}
                            <div className="w-full max-w-lg bg-white p-4 rounded shadow border border-slate-200 mb-6 mt-4">
                                <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 text-center border-b pb-2">is_prime Array (Sieve Grid)</h3>
                                <div className="grid grid-cols-5 gap-2">
                                    {[...Array(16).keys()].map((num) => {
                                        const isCrossed = s.grid[num] === false;
                                        const isPrime = s.grid[num] === true;
                                        
                                        let style = "bg-slate-50 text-slate-500 border-slate-200"; // default unknown
                                        if (isCrossed) style = "bg-rose-50 text-rose-300 border-rose-200 crossed-out opacity-60";
                                        else if (isPrime) style = "bg-emerald-100 text-emerald-800 border-emerald-400 font-bold shadow-sm";

                                        return (
                                            <div key={num} className={`h-10 flex items-center justify-center rounded border transition-all duration-300 text-sm font-mono ${style}`}>
                                                {num}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            {/* Primes Extraction */}
                            {(s.phase === 'extract' || s.phase === 'test' || s.phase === 'done') && (
                                <div className="w-full max-w-lg bg-white p-4 rounded shadow border border-slate-200 mb-6 fade-in">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 text-center border-b pb-2">Extracted Primes List</h3>
                                    <div className="flex flex-wrap gap-2 justify-center">
                                        {s.primes.map((p, idx) => {
                                            const isActivePair = s.pairIdx === idx || s.pairIdx === idx - 1;
                                            return (
                                                <div key={idx} className={`px-3 py-1 rounded border text-xs font-mono transition-all ${isActivePair ? 'bg-indigo-500 text-white border-indigo-600 shadow-md font-bold scale-110 pop-in' : 'bg-slate-100 text-slate-600 border-slate-300'}`}>
                                                    {p}
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* Testing Math Formula */}
                            {(s.phase === 'test' || s.phase === 'done') && s.pairIdx >= 0 && (
                                <div className="w-full max-w-lg flex flex-col gap-4 fade-in">
                                    <div className="bg-slate-800 text-white p-4 rounded shadow border border-slate-700 flex flex-col items-center relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                                        <div className="text-[10px] text-slate-400 uppercase tracking-widest mb-2">Equation Check</div>
                                        
                                        <div className="flex items-center gap-3 text-lg font-mono font-bold pop-in key={s.pairIdx}">
                                            <span className="text-indigo-300">{s.primes[s.pairIdx]}</span>
                                            <span className="text-slate-500">+</span>
                                            <span className="text-indigo-300">{s.primes[s.pairIdx + 1]}</span>
                                            <span className="text-slate-500">+ 1 = </span>
                                            <span className="text-yellow-400 text-2xl ml-2">{s.testVal}</span>
                                        </div>

                                        {s.isValid !== null && (
                                            <div className={`mt-4 px-4 py-1.5 rounded-full text-xs font-bold pop-in flex items-center gap-2 ${s.isValid ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : 'bg-rose-500/20 text-rose-400 border border-rose-500/50'}`}>
                                                {s.isValid ? <><i className="fa-solid fa-check"></i> Valid! It is Prime.</> : <><i className="fa-solid fa-xmark"></i> Invalid. Not Prime.</>}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Global Counter */}
                            {s.phase !== 'sieve' && (
                                <div className="fixed top-4 right-4 bg-slate-800 text-white p-3 rounded-lg shadow-lg border-2 border-indigo-500 z-50 flex items-center gap-3 fade-in" dir="ltr">
                                    <div className="text-xs text-slate-400">Valid Count:</div>
                                    <div className="text-2xl font-black font-mono text-emerald-400">{s.count}</div>
                                </div>
                            )}

                        </div>
                    </div>
                );
            };

            const renderCode = () => {
                const codeSegments = [
                    {
                        title: "1. الإعدادات والحد الأقصى",
                        desc: "نستدعي المكتبات، ونعرف ثابت MAX_N الذي يمثل أقصى رقم سنتعامل معه (مليون). ننشئ المصفوفة المنطقية للغربال is_prime ونجعل كل قيمها الابتدائية true، وننشئ مصفوفة primes لحفظ الأعداد الأولية لاحقاً.",
                        code: `#include <iostream>\n#include <vector>\nusing namespace std;\n\nconst int MAX_N = 1000000;\nvector<bool> is_prime(MAX_N + 1, true);\nvector<int> primes;`
                    },
                    {
                        title: "2. غربال إراتوستينس (الشطب)",
                        desc: "نستثني 0 و 1. ثم نبدأ حلقة من 2 إلى جذر الرقم الأقصى. إذا كان الرقم i أولياً (true)، نقوم بالدخول في حلقة فرعية تبدأ من (i*i) لشطب (false) كل مضاعفاته لأنه يستحيل أن تكون أولية.",
                        code: `int findPrime(int n) {\n    is_prime[0] = is_prime[1] = false;\n    for (int i = 2; i * i <= MAX_N; i++) {\n        if (is_prime[i]) {\n            for (int j = i * i; j <= MAX_N; j += i) {\n                is_prime[j] = false;\n            }\n        }\n    }`
                    },
                    {
                        title: "3. استخراج الأعداد وتطبيق نولدباخ",
                        desc: "نمر على الأرقام من 2 إلى n المدخلة، وأي رقم نجد أن is_prime الخاص به ما زال true نضيفه لقائمة primes. بعد ذلك، نمر على القائمة ونختبر كل رقمين متجاورين، ونرسل ناتج معادلتهما مباشرة لمصفوفة الغربال السريعة is_prime للتحقق.",
                        code: `    for (int i = 2; i <= n; ++i){\n        if (is_prime[i]) primes.push_back(i);\n    }\n    int count = 0;\n    for (int i = 1; i < (int)primes.size(); ++i){\n        if (is_prime[primes[i] + primes[i-1] + 1]){\n            count++;\n        }\n    }\n    return count;\n}`
                    },
                    {
                        title: "4. الدالة الرئيسية والطباعة",
                        desc: "نقرأ المدخلات n و k. ننادي الدالة findPrime لتعيد لنا عدد أزواج نولدباخ. وأخيراً، إذا كان هذا العدد أكبر من أو يساوي المطلوب k، نطبع YES وإلا نطبع NO.",
                        code: `int main() { \n    int n, k;\n    cin >> n >> k;\n    int count = findPrime(n);\n    if (count >= k)\n        cout << "YES\\n";\n    else\n        cout << "NO\\n";\n    return 0;\n}`
                    }
                ];

                return (
                    <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                        <div className="max-w-6xl mx-auto w-full space-y-4">
                            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm text-center">
                                <h2 className="text-lg font-bold text-slate-800">تفصيل الكود الأصلي والمجزء</h2>
                                <p className="text-xs text-slate-600 mt-1">
                                    الجهة اليسرى تحتوي على الكود الأصلي كما هو. الجهة اليمنى تشرح للطالب وظيفة كل مقطع برمجياً وارتباطه بالخوارزمية.
                                </p>
                            </div>

                            <div className="space-y-4">
                                {codeSegments.map((seg, idx) => (
                                    <div key={idx} className="flex flex-col md:flex-row bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
                                        
                                        <div className="w-full md:w-5/12 bg-slate-50 p-4 border-b md:border-b-0 md:border-l border-slate-200 flex flex-col justify-center">
                                            <h3 className="font-bold text-indigo-800 mb-2 text-sm">{seg.title}</h3>
                                            <p className="text-xs text-slate-700 leading-relaxed">{seg.desc}</p>
                                        </div>
                                        
                                        <div className="w-full md:w-7/12 bg-[#1e1e1e] p-4 overflow-x-auto" dir="ltr">
                                            <pre className="m-0">
                                                <code className="text-xs font-mono text-[#d4d4d4] whitespace-pre" style={{lineHeight: '1.6'}}>
                                                    {seg.code}
                                                </code>
                                            </pre>
                                        </div>

                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-slate-200">
                    <header className="bg-white px-4 py-3 shadow-sm z-30 flex flex-col md:flex-row md:items-center justify-between gap-3 border-b border-slate-200">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-indigo-700 rounded flex items-center justify-center text-white text-sm shadow">
                                <i className="fa-solid fa-filter"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-bold text-slate-800 leading-tight">Noldbach Problem</h1>
                                <p className="text-slate-500 text-[10px] font-semibold">تطبيق مباشر لغربال إراتوستينس (Sieve)</p>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded border border-slate-200 gap-1 overflow-x-auto text-xs shadow-inner">
                            {['problem', 'data', 'strategy', 'visualizer', 'code'].map((tabKey, idx) => {
                                const labels = ["1. المسألة الأصلية", "2. فهم الغربال", "3. استراتيجية الحل", "4. التتبع البصري", "5. تفصيل الكود"];
                                return (
                                    <button 
                                        key={tabKey}
                                        onClick={() => setActiveTab(tabKey)} 
                                        className={`px-3 py-1.5 rounded font-bold transition-all whitespace-nowrap ${activeTab === tabKey ? 'bg-white text-indigo-800 shadow border border-slate-200' : 'text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {labels[idx]}
                                    </button>
                                )
                            })}
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden">
                        {activeTab === 'problem' && renderProblem()}
                        {activeTab === 'data' && renderDataStructures()}
                        {activeTab === 'strategy' && renderStrategy()}
                        {activeTab === 'visualizer' && renderVisualizer()}
                        {activeTab === 'code' && renderCode()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
