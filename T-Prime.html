<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شرح خوارزمية T-Prime</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; font-size: 14px; }
        #root { height: 100%; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // مصفوفة اختبار للتتبع البصري
        // 6: عادي (ليس مربع) -> NO
        // 9: مربع كامل لجذر أولي (3) -> YES
        // 16: مربع كامل لجذر غير أولي (4) -> NO
        const TEST_ARRAY = [6, 9, 16];

        function isPrimeMock(n) {
            if (n <= 1) return false;
            for (let i = 2; i * i <= n; i++) {
                if (n % i === 0) return false;
            }
            return true;
        }

        function generateSteps() {
            let steps = [];

            const cloneState = (idx = -1, phase = null, x = null, y = null, isPerfect = null, isPrime = null, result = null) => ({
                idx, phase, x, y, isPerfect, isPrime, result
            });

            // 1. Initial State
            steps.push({
                happened: "بدأ البرنامج. لدينا مصفوفة أرقام نحتاج لاختبارها: [6, 9, 16].",
                next: "سندخل في حلقة تكرار (Loop) للمرور عليها واحدة تلو الأخرى. سنبدأ بالرقم الأول (6).",
                state: cloneState()
            });

            for (let i = 0; i < TEST_ARRAY.length; i++) {
                let x = TEST_ARRAY[i];
                let y = Math.floor(Math.sqrt(x));
                
                // Step: Pick number
                steps.push({
                    happened: `المؤشر الآن عند الرقم x = ${x}.`,
                    next: `سنقوم بحساب جذره التربيعي (التقريبي للعدد الصحيح) باستخدام الدالة sqrt(${x}).`,
                    state: cloneState(i, 'pick', x)
                });

                // Step: Sqrt
                steps.push({
                    happened: `تم حساب الجذر التربيعي للرقم ${x} وهو y = ${y}.`,
                    next: `سنختبر هل ${x} مربع كامل؟ سنضرب (y * y) ونرى إن كان الناتج يساوي ${x}.`,
                    state: cloneState(i, 'sqrt', x, y)
                });

                let isPerfect = (y * y === x);

                // Step: Check Perfect Square
                if (!isPerfect) {
                    steps.push({
                        happened: `الشرط (${y} * ${y} == ${x}) خاطئ! ${y * y} لا تساوي ${x}. إذن هو ليس مربعاً كاملاً.`,
                        next: "بما أنه ليس مربعاً كاملاً، فهو مستحيل أن يكون T-Prime. سنطبع NO وننتقل للرقم التالي.",
                        state: cloneState(i, 'perfect', x, y, isPerfect)
                    });
                    
                    steps.push({
                        happened: `تمت طباعة NO للرقم ${x}.`,
                        next: i < TEST_ARRAY.length - 1 ? `سننتقل للرقم التالي في المصفوفة.` : `انتهت المصفوفة وانتهى البرنامج.`,
                        state: cloneState(i, 'done', x, y, isPerfect, null, 'NO')
                    });
                    continue;
                } else {
                    steps.push({
                        happened: `الشرط صحيح! (${y} * ${y} == ${x}). إذن الرقم ${x} هو مربع كامل.`,
                        next: `اجتزنا الفلتر الأول. الفلتر الثاني: هل الجذر (${y}) هو عدد أولي؟ سنمرره لدالة isPrime.`,
                        state: cloneState(i, 'perfect', x, y, isPerfect)
                    });
                }

                let prime = isPrimeMock(y);

                // Step: Check Prime
                if (prime) {
                    steps.push({
                        happened: `دالة isPrime(${y}) أجابت بـ (نعم). الرقم ${y} هو عدد أولي!`,
                        next: `تحققت كل الشروط (مربع كامل + جذره أولي). سنطبع YES للرقم ${x}.`,
                        state: cloneState(i, 'prime', x, y, isPerfect, prime)
                    });
                    steps.push({
                        happened: `تمت طباعة YES للرقم ${x}. إنه T-Prime!`,
                        next: i < TEST_ARRAY.length - 1 ? `سننتقل للرقم التالي في المصفوفة.` : `انتهت المصفوفة وانتهى البرنامج.`,
                        state: cloneState(i, 'done', x, y, isPerfect, prime, 'YES')
                    });
                } else {
                    steps.push({
                        happened: `دالة isPrime(${y}) أجابت بـ (لا). الرقم ${y} ليس أولياً!`,
                        next: `الشرط الثاني لم يتحقق. سنطبع NO للرقم ${x}.`,
                        state: cloneState(i, 'prime', x, y, isPerfect, prime)
                    });
                    steps.push({
                        happened: `تمت طباعة NO للرقم ${x} لأن جذره ليس أولياً.`,
                        next: i < TEST_ARRAY.length - 1 ? `سننتقل للرقم التالي في المصفوفة.` : `انتهت المصفوفة وانتهى البرنامج.`,
                        state: cloneState(i, 'done', x, y, isPerfect, prime, 'NO')
                    });
                }
            }

            return steps;
        }

        function App() {
            const [activeTab, setActiveTab] = useState('problem'); 
            const stepsRef = useRef(generateSteps());
            const [stepIdx, setStepIdx] = useState(0);

            const renderProblem = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">نص المسألة (T-Prime)</h2>
                            
                            <div className="text-sm space-y-4 text-slate-700 leading-relaxed">
                                <p className="font-semibold bg-slate-100 p-4 rounded border border-slate-200 shadow-inner">
                                    نعلم أن الأعداد الأولية (Primes) هي أعداد صحيحة موجبة لها بالضبط قاسمان موجبان مختلفان (الـ 1 والرقم نفسه). 
                                    بالمثل، سنسمي عدداً صحيحاً موجباً أنه <strong>(أولي-T) أو (T-Prime)</strong>، إذا كان له <strong>بالضبط ثلاثة قواسم موجبة مختلفة</strong>.<br/><br/>
                                    مُعطاة مصفوفة تتكون من <span dir="ltr" className="font-mono font-bold mx-1">n</span> عدداً صحيحاً. لكل رقم فيها، حدد ما إذا كان T-Prime أم لا.
                                </p>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                    <div className="bg-slate-50 p-4 rounded border border-slate-200">
                                        <h3 className="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">المدخلات (Input)</h3>
                                        <ul className="list-disc list-inside space-y-1 text-xs">
                                            <li>السطر الأول: عدد الأرقام في المصفوفة <code className="font-mono">n</code>.</li>
                                            <li>السطر الثاني: <code className="font-mono">n</code> أرقام صحيحة موجبة مفصولة بمسافات.</li>
                                        </ul>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded border border-slate-200">
                                        <h3 className="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">المخرجات (Output)</h3>
                                        <ul className="list-disc list-inside space-y-1 text-xs">
                                            <li>اطبع <code className="font-mono">YES</code> إذا كان الرقم T-Prime.</li>
                                            <li>اطبع <code className="font-mono">NO</code> إذا لم يكن كذلك، كل نتيجة في سطر منفصل.</li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row gap-4 mt-4">
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Example Input</div>
                                        <div>3 <span className="text-slate-500 text-[10px] ml-2">// Array size</span></div>
                                        <div>4 5 6 <span className="text-slate-500 text-[10px] ml-2">// The numbers</span></div>
                                    </div>
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Expected Output</div>
                                        <div className="text-emerald-400">YES <span className="text-slate-500 text-[10px] ml-2">// 4 has divisors 1, 2, 4 (Exactly 3)</span></div>
                                        <div className="text-rose-400">NO <span className="text-slate-500 text-[10px] ml-2">// 5 has divisors 1, 5 (Exactly 2)</span></div>
                                        <div className="text-rose-400">NO <span className="text-slate-500 text-[10px] ml-2">// 6 has divisors 1, 2, 3, 6 (Exactly 4)</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderConcept = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">التفسير الرياضي (لماذا 3 قواسم؟)</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="space-y-3 bg-slate-50 p-4 rounded border border-slate-200">
                                    <h3 className="text-xs font-bold text-slate-700 border-b pb-1">الأعداد الأولية (Primes)</h3>
                                    <p className="text-[11px] text-slate-600 leading-relaxed">
                                        أي عدد أولي يمتلك <strong>قاسمين فقط</strong>: (1) والرقم نفسه.
                                    </p>
                                    <div className="font-mono text-xs text-indigo-700 bg-white p-2 rounded border" dir="ltr">
                                        Number: 7<br/>Divisors: [1, 7]<br/>Count: 2 (Not T-Prime)
                                    </div>
                                </div>

                                <div className="space-y-3 bg-slate-50 p-4 rounded border border-slate-200">
                                    <h3 className="text-xs font-bold text-slate-700 border-b pb-1">الأعداد المركبة العادية</h3>
                                    <p className="text-[11px] text-slate-600 leading-relaxed">
                                        تمتلك قواسم كثيرة (دائماً تأتي كأزواج، مما يجعل عدد القواسم عادة زوجياً ومكبر من 2).
                                    </p>
                                    <div className="font-mono text-xs text-indigo-700 bg-white p-2 rounded border" dir="ltr">
                                        Number: 6<br/>Divisors: [1, 2, 3, 6]<br/>Count: 4 (Not T-Prime)
                                    </div>
                                </div>

                                <div className="space-y-3 bg-emerald-50 p-4 rounded border border-emerald-200 shadow-sm">
                                    <h3 className="text-xs font-bold text-emerald-800 border-b border-emerald-200 pb-1">مربعات الأعداد الأولية</h3>
                                    <p className="text-[11px] text-emerald-700 leading-relaxed">
                                        رقم ناتج عن (أولي × نفسه). قواسمه هي: (1)، (الجذر)، (الرقم نفسه). <strong>بالضبط 3 قواسم!</strong>
                                    </p>
                                    <div className="font-mono text-xs text-emerald-800 bg-white p-2 rounded border border-emerald-200 font-bold" dir="ltr">
                                        Number: 9 (3×3)<br/>Divisors: [1, 3, 9]<br/>Count: 3 (Is T-Prime!)
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderStrategy = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-6">
                        <div className="bg-white p-6 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2 flex items-center gap-2">
                                <i className="fa-solid fa-chess-knight"></i> استراتيجية الحل البرمجية
                            </h2>
                            <p className="text-sm text-slate-600 mb-6">البحث عن كل قواسم الرقم يستغرق وقتاً طويلاً جداً <span dir="ltr" className="font-mono text-xs mx-1">O(√N)</span> لكل رقم. بدلاً من ذلك، نستخدم الاستنتاج الرياضي الذي يختصر الحل إلى "فلترين" سريعين جداً.</p>
                            
                            <div className="space-y-5 text-sm text-slate-700 leading-relaxed">
                                
                                <div className="bg-blue-50/50 p-4 rounded border border-blue-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
                                    <h3 className="font-bold text-blue-900 mb-2">
                                        الفلتر الأول: هل الرقم مربع كامل؟ (Perfect Square)
                                    </h3>
                                    <p className="mb-2 text-xs">نحسب الجذر التربيعي للرقم، ثم نختبر هل (الجذر × الجذر = الرقم الأصلي). إذا لم يكن مربعاً كاملاً، فهو مستحيل أن يكون T-Prime فنطبع NO فوراً ونتوقف.</p>
                                    <div className="bg-white p-3 rounded border border-blue-200 text-xs font-mono text-slate-600" dir="ltr">
                                        int y = sqrt(x);<br/>
                                        if (y * y != x) &#123; cout &lt;&lt; "NO"; &#125;
                                    </div>
                                </div>

                                <div className="bg-purple-50/50 p-4 rounded border border-purple-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-purple-400"></div>
                                    <h3 className="font-bold text-purple-900 mb-2">
                                        الفلتر الثاني: هل الجذر عدد أولي؟ (Is Prime)
                                    </h3>
                                    <p className="mb-2 text-xs">إذا اجتاز الرقم الفلتر الأول، نأخذ جذره <code dir="ltr" className="font-mono mx-1">y</code> ونفحصه: هل هو عدد أولي؟ إذا كان جذره أولياً، فهذا يعني أن الرقم الأصلي هو T-Prime (مثل 9 جذرها 3، و 3 أولي، إذن 9 T-Prime).</p>
                                    <div className="bg-white p-3 rounded border border-purple-200 text-xs font-mono text-slate-600" dir="ltr">
                                        if (isPrime(y)) &#123; cout &lt;&lt; "YES"; &#125;<br/>
                                        else &#123; cout &lt;&lt; "NO"; &#125;
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderVisualizer = () => {
                const s = stepsRef.current[stepIdx].state;
                const currentStepInfo = stepsRef.current[stepIdx];

                return (
                    <div className="flex flex-col lg:flex-row h-full bg-slate-100 fade-in overflow-hidden">
                        
                        {/* Control Panel */}
                        <div className="w-full lg:w-1/3 bg-white border-l border-slate-200 shadow-lg z-20 flex flex-col">
                            <div className="p-3 bg-slate-800 text-white border-b border-slate-700">
                                <h2 className="text-sm font-bold">التتبع البصري التفاعلي</h2>
                                <p className="text-[10px] text-slate-400">انقر لتشغيل الفلاتر (خط التجميع) على الأرقام.</p>
                            </div>
                            
                            <div className="p-4 flex-1 overflow-y-auto space-y-4">
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-slate-800 mb-1 border-b border-slate-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-check-circle text-emerald-600"></i> ماذا حدث للتو؟
                                    </h3>
                                    <p className="text-xs text-slate-700 leading-relaxed mt-2">{currentStepInfo.happened}</p>
                                </div>

                                <div className="bg-indigo-50 border border-indigo-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-indigo-900 mb-1 border-b border-indigo-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left text-indigo-600"></i> ماذا سيحدث الآن؟
                                    </h3>
                                    <p className="text-xs text-indigo-800 leading-relaxed mt-2">{currentStepInfo.next}</p>
                                </div>
                            </div>

                            <div className="p-4 bg-slate-50 border-t border-slate-200">
                                <button 
                                    onClick={() => setStepIdx(Math.min(stepsRef.current.length - 1, stepIdx + 1))} 
                                    disabled={stepIdx === stepsRef.current.length - 1}
                                    className="w-full py-3 rounded bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold text-sm shadow transition flex items-center justify-center gap-2"
                                >
                                    {stepIdx === stepsRef.current.length - 1 ? 'انتهى التنفيذ' : 'تنفيذ الخطوة التالية'}
                                    {stepIdx < stepsRef.current.length - 1 && <i className="fa-solid fa-play text-xs"></i>}
                                </button>
                                
                                <div className="flex justify-between mt-3">
                                    <button onClick={() => setStepIdx(0)} disabled={stepIdx === 0} className="text-xs text-slate-500 hover:text-slate-800 transition disabled:opacity-50 flex items-center gap-1">
                                        <i className="fa-solid fa-rotate-right"></i> إعادة من البداية
                                    </button>
                                    <span className="text-xs font-mono text-slate-400 bg-slate-200 px-2 py-0.5 rounded">
                                        خطوة {stepIdx + 1} / {stepsRef.current.length}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Visual Area */}
                        <div className="flex-1 p-4 flex flex-col items-center justify-start bg-slate-100 overflow-y-auto relative" dir="ltr">
                            
                            {/* Array Display */}
                            <div className="w-full max-w-md bg-white p-4 rounded shadow border border-slate-200 mb-6 mt-4">
                                <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 text-center border-b pb-2">Input Array</h3>
                                <div className="flex justify-center gap-4">
                                    {TEST_ARRAY.map((num, i) => {
                                        const isCurrent = s.idx === i;
                                        const isDone = s.idx > i || (s.idx === i && s.phase === 'done');
                                        
                                        let style = "bg-slate-50 border-slate-200 text-slate-400";
                                        if (isCurrent && !isDone) style = "bg-yellow-100 border-yellow-400 text-yellow-800 scale-110 shadow-md font-bold";
                                        else if (isDone) style = "bg-slate-200 border-slate-300 text-slate-500 opacity-60";

                                        return (
                                            <div key={i} className={`w-12 h-12 flex items-center justify-center rounded border-2 transition-all duration-300 ${style} text-lg font-mono relative`}>
                                                {num}
                                                {isCurrent && !isDone && <i className="fa-solid fa-caret-down absolute -top-5 text-yellow-500 text-xl pop-in"></i>}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            {/* Logic Pipeline */}
                            {s.idx >= 0 && (
                                <div className="w-full max-w-md flex flex-col items-center gap-4 fade-in">
                                    
                                    {/* Sqrt Block */}
                                    <div className={`w-full p-4 rounded shadow border transition-colors duration-300 ${s.phase !== 'pick' ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-200'}`}>
                                        <div className="flex justify-between items-center text-sm font-mono">
                                            <span className="text-slate-500">1. Calculate y = sqrt({s.x})</span>
                                            {s.y !== null && <span className="font-bold text-indigo-700 text-lg bg-white px-2 rounded border border-indigo-200 shadow-sm pop-in">{s.y}</span>}
                                        </div>
                                    </div>

                                    <i className={`fa-solid fa-arrow-down ${s.phase !== 'pick' ? 'text-indigo-300' : 'text-slate-200'}`}></i>

                                    {/* Perfect Square Filter */}
                                    <div className={`w-full p-4 rounded shadow border transition-colors duration-300 ${s.isPerfect !== null ? (s.isPerfect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200') : 'bg-white border-slate-200'}`}>
                                        <div className="flex flex-col gap-2 text-sm font-mono">
                                            <span className="text-slate-500">2. Filter: Perfect Square? (y*y == x)</span>
                                            {s.isPerfect !== null && (
                                                <div className="flex justify-between items-center pop-in">
                                                    <span className="text-slate-700 bg-white px-2 py-1 rounded border shadow-sm">{s.y} × {s.y} = {s.y * s.y}</span>
                                                    <span className={`font-bold px-2 py-1 rounded ${s.isPerfect ? 'bg-emerald-200 text-emerald-800' : 'bg-rose-200 text-rose-800'}`}>
                                                        {s.isPerfect ? 'TRUE' : 'FALSE'}
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Prime Filter (Only if perfect square) */}
                                    { s.isPerfect !== false && (
                                        <>
                                            <i className={`fa-solid fa-arrow-down ${s.isPrime !== null ? 'text-indigo-300' : 'text-slate-200'}`}></i>
                                            <div className={`w-full p-4 rounded shadow border transition-colors duration-300 ${s.isPrime !== null ? (s.isPrime ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200') : 'bg-white border-slate-200'}`}>
                                                <div className="flex justify-between items-center text-sm font-mono">
                                                    <span className="text-slate-500">3. Filter: isPrime(y)?</span>
                                                    {s.isPrime !== null && (
                                                        <span className={`font-bold px-2 py-1 rounded pop-in ${s.isPrime ? 'bg-emerald-200 text-emerald-800' : 'bg-rose-200 text-rose-800'}`}>
                                                            {s.isPrime ? `YES (${s.y} is Prime)` : `NO (${s.y} is Not Prime)`}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {/* Final Result */}
                                    { s.result !== null && (
                                        <div className={`mt-4 w-full p-4 text-center rounded font-black text-2xl tracking-widest pop-in shadow-lg border-2 ${s.result === 'YES' ? 'bg-emerald-500 border-emerald-600 text-white' : 'bg-rose-500 border-rose-600 text-white'}`}>
                                            {s.result}
                                        </div>
                                    )}

                                </div>
                            )}

                        </div>
                    </div>
                );
            };

            const renderCode = () => {
                const codeSegments = [
                    {
                        title: "1. الإدخال وتجهيز الحلقة",
                        desc: "نقرأ عدد العناصر n، ثم نبدأ حلقة التكرار (Loop) للمرور على جميع العناصر لاستقبالها واختبارها عنصراً عنصراً.",
                        code: `int n;\ncin >> n;\nfor (int i = 0; i < n; ++i){\n    int x;\n    cin >> x;`
                    },
                    {
                        title: "2. استخراج الجذر (y)",
                        desc: "نستخدم دالة sqrt المدمجة لحساب الجذر التربيعي للرقم، ونخزنه في متغير صحيح y. (مما يعني أنه سيتم تجاهل أي فواصل عشرية).",
                        code: `    int y = sqrt(x);`
                    },
                    {
                        title: "3. الفلتر الأول: هل هو مربع كامل؟",
                        desc: "نضرب (y * y) ونقارنها بالرقم الأصلي x. إذا لم تتساوى (بسبب تجاهلنا للفواصل العشرية سابقاً)، فهذا يعني أن الرقم ليس مربعاً كاملاً. نطبع NO ونتخطى باقي الكود (continue).",
                        code: `    if (y * y != x){\n        cout << "NO\\n";\n        continue; //check whether x is a perfect square\n    }`
                    },
                    {
                        title: "4. الفلتر الثاني: هل الجذر أولي؟",
                        desc: "إذا اجتاز الرقم الفلتر السابق، فهذا يعني أنه مربع كامل لجذره (y). الآن الشرط الأخير: إذا كان هذا الجذر (y) عدداً أولياً، فالرقم T-Prime ونطبع YES. وإلا نطبع NO.",
                        code: `    if (isPrime(y))\n        cout << "YES\\n";\n    else\n        cout << "NO\\n"; \n}`
                    }
                ];

                return (
                    <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                        <div className="max-w-6xl mx-auto w-full space-y-4">
                            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm text-center">
                                <h2 className="text-lg font-bold text-slate-800">تفصيل الكود الأصلي والمجزء</h2>
                                <p className="text-xs text-slate-600 mt-1">
                                    الجهة اليسرى تحتوي على الكود الأصلي (دون أي تعديل). الجهة اليمنى تشرح للطالب ما الذي يحلّه هذا الجزء بالتحديد.
                                </p>
                            </div>

                            <div className="space-y-4">
                                {codeSegments.map((seg, idx) => (
                                    <div key={idx} className="flex flex-col md:flex-row bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
                                        
                                        <div className="w-full md:w-5/12 bg-slate-50 p-4 border-b md:border-b-0 md:border-l border-slate-200 flex flex-col justify-center">
                                            <h3 className="font-bold text-indigo-800 mb-2 text-sm">{seg.title}</h3>
                                            <p className="text-xs text-slate-700 leading-relaxed">{seg.desc}</p>
                                        </div>
                                        
                                        <div className="w-full md:w-7/12 bg-[#1e1e1e] p-4 overflow-x-auto" dir="ltr">
                                            <pre className="m-0">
                                                <code className="text-xs font-mono text-[#d4d4d4] whitespace-pre" style={{lineHeight: '1.6'}}>
                                                    {seg.code}
                                                </code>
                                            </pre>
                                        </div>

                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-slate-200">
                    <header className="bg-white px-4 py-3 shadow-sm z-30 flex flex-col md:flex-row md:items-center justify-between gap-3 border-b border-slate-200">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-indigo-700 rounded flex items-center justify-center text-white text-sm shadow">
                                <i className="fa-solid fa-filter"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-bold text-slate-800 leading-tight">T-Prime</h1>
                                <p className="text-slate-500 text-[10px] font-semibold">استخدام الخصائص الرياضية لفلترة الأرقام</p>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded border border-slate-200 gap-1 overflow-x-auto text-xs shadow-inner">
                            {['problem', 'concept', 'strategy', 'visualizer', 'code'].map((tabKey, idx) => {
                                const labels = ["1. المسألة الأصلية", "2. التفسير الرياضي", "3. استراتيجية الحل", "4. التتبع البصري", "5. تفصيل الكود"];
                                return (
                                    <button 
                                        key={tabKey}
                                        onClick={() => setActiveTab(tabKey)} 
                                        className={`px-3 py-1.5 rounded font-bold transition-all whitespace-nowrap ${activeTab === tabKey ? 'bg-white text-indigo-800 shadow border border-slate-200' : 'text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {labels[idx]}
                                    </button>
                                )
                            })}
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden">
                        {activeTab === 'problem' && renderProblem()}
                        {activeTab === 'concept' && renderConcept()}
                        {activeTab === 'strategy' && renderStrategy()}
                        {activeTab === 'visualizer' && renderVisualizer()}
                        {activeTab === 'code' && renderCode()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
