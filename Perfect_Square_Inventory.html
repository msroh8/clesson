<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شرح خوارزمية The Perfect Square Inventory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; font-size: 14px; }
        #root { height: 100%; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function generateSteps() {
            let steps = [];

            const cloneState = (n, mult, currPrime = null, count = 0, factors = [], phase = null) => ({
                n, mult, currPrime, count, factors: [...factors], phase
            });

            // 1. Initial State (N = 60)
            steps.push({
                happened: "بدأ البرنامج. استلم مدير المستودع شحنة تحتوي على (60) صندوقاً. المربع المثالي يتطلب أن يكون العدد ناتج ضرب رقم في نفسه.",
                next: "سنقوم بتحليل العدد 60 إلى عوامله الأولية لاكتشاف النواقص. سنبدأ بالبحث عن الرقم 2.",
                state: cloneState(60, 1, null, 0, [], 'start')
            });

            // Phase 1: Divisibility by 2
            steps.push({
                happened: "بدأنا الفحص على القاسم الأول (2). هل 60 يقبل القسمة على 2 بدون باقٍ؟ نعم.",
                next: "سنقسم 60 على 2، ونزيد عداد الرقم (2) بواحد.",
                state: cloneState(60, 1, 2, 0, [], 'check2')
            });

            steps.push({
                happened: "60 ÷ 2 = 30. العداد = 1. سجلنا العامل الأول (2). هل 30 تقبل القسمة على 2 مجدداً؟ نعم.",
                next: "سنقسم 30 على 2 ونزيد العداد.",
                state: cloneState(30, 1, 2, 1, [2], 'check2')
            });

            steps.push({
                happened: "30 ÷ 2 = 15. العداد = 2. سجلنا العامل الثاني (2). هل 15 تقبل القسمة على 2؟ لا.",
                next: "توقفنا عن القسمة على 2. الآن نتحقق: هل العداد (2) زوجي أم فردي؟",
                state: cloneState(15, 1, 2, 2, [2, 2], 'eval2')
            });

            steps.push({
                happened: "العداد (2) عدد زوجي! هذا يعني أن الرقم 2 لديه 'شريك' لتكوين مربع. لسنا بحاجة لإضافة أي نواقص لـ Multiplier.",
                next: "سننتقل للبحث في الأرقام الفردية (3، 5، 7...). سنبدأ بالرقم 3.",
                state: cloneState(15, 1, 2, 2, [2, 2], 'eval2')
            });

            // Phase 2: Odd factors (Starting with 3)
            steps.push({
                happened: "نحن الآن نفحص الرقم 3. هل 15 تقبل القسمة على 3؟ نعم.",
                next: "سنقسم 15 على 3 ونزيد العداد.",
                state: cloneState(15, 1, 3, 0, [2, 2], 'checkOdd')
            });

            steps.push({
                happened: "15 ÷ 3 = 5. العداد = 1. سجلنا العامل (3). هل 5 تقبل القسمة على 3؟ لا.",
                next: "نتحقق الآن: هل العداد (1) زوجي أم فردي؟",
                state: cloneState(5, 1, 3, 1, [2, 2, 3], 'checkOdd')
            });

            steps.push({
                happened: "العداد (1) فردي! الرقم 3 وحيد وبدون شريك، وهذا يكسر المربع الكامل.",
                next: "يجب علينا ضرب الـ Multiplier في 3 لتعويض هذا النقص.",
                state: cloneState(5, 1, 3, 1, [2, 2, 3], 'evalOdd_Fail')
            });

            steps.push({
                happened: "تم تحديث Multiplier = 1 × 3 = 3. تم ترقيع النقص بنجاح.",
                next: "انتهت حلقة الأرقام الفردية لأن (3 × 3 > 5). ننتقل للمرحلة الأخيرة.",
                state: cloneState(5, 3, 3, 1, [2, 2, 3], 'evalOdd_Done')
            });

            // Phase 3: Remaining Prime
            steps.push({
                happened: "المرحلة الأخيرة: نفحص ما تبقى من الرقم الأصلي (وهو 5). هل 5 أكبر من 2؟ نعم.",
                next: "بما أنه أكبر من 2، فهذا يعني أنه 'عدد أولي' متبقٍ وأسه فردي (موجود مرة واحدة فقط).",
                state: cloneState(5, 3, null, 0, [2, 2, 3], 'checkRem')
            });

            steps.push({
                happened: "الرقم 5 وحيد ويكسر المربع. يجب أن نضربه في الـ Multiplier لتعويض النقص.",
                next: "سنقوم بضرب: 3 × 5.",
                state: cloneState(5, 3, null, 0, [2, 2, 3], 'evalRem')
            });

            steps.push({
                happened: "تم تحديث Multiplier = 3 × 5 = 15. انتهى التحليل!",
                next: "البرنامج سيطبع (15). أي أننا نحتاج 15 شحنة لتكوين مربع (60 × 15 = 900، وهو مربع 30).",
                state: cloneState(5, 15, null, 0, [2, 2, 3, 5], 'done')
            });

            return steps;
        }

        function App() {
            const [activeTab, setActiveTab] = useState('problem'); 
            const stepsRef = useRef(generateSteps());
            const [stepIdx, setStepIdx] = useState(0);

            const renderProblem = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">نص المسألة (The Perfect Square Inventory)</h2>
                            
                            <div className="text-sm space-y-4 text-slate-700 leading-relaxed">
                                <p className="font-semibold bg-slate-100 p-4 rounded border border-slate-200 shadow-inner">
                                    مدير مستودع تلقى شحنة تحتوي على <span dir="ltr" className="font-mono text-indigo-700 font-bold mx-1">N</span> صندوق تخزين مربع متطابق. يريد تكديسها على الأرض لتشكيل ترتيب <strong>مربع مثالي (Perfect Square)</strong> (مثلاً، 2×2، 3×3، 4×4).<br/><br/>
                                    ومع ذلك، أدرك أن <span dir="ltr" className="font-mono mx-1">N</span> قد لا يكون عدداً مربعاً كاملاً، لذا لا يمكنه تشكيل مربع مع المخزون الحالي. قرر طلب المزيد من الشحنات بنفس الحجم بالضبط (<span dir="ltr" className="font-mono mx-1">N</span> صندوقاً لكل شحنة) حتى يسمح له العدد الإجمالي ببناء مربع مثالي.
                                </p>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                    <div className="bg-slate-50 p-4 rounded border border-slate-200">
                                        <h3 className="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">المدخلات (Input)</h3>
                                        <ul className="list-disc list-inside space-y-1 text-xs">
                                            <li>سطر واحد يحتوي على العدد الصحيح <code className="font-mono">N</code> (عدد الصناديق في شحنة واحدة).</li>
                                        </ul>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded border border-slate-200">
                                        <h3 className="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">المخرجات (Output)</h3>
                                        <ul className="list-disc list-inside space-y-1 text-xs">
                                            <li>الحد الأدنى لعدد الشحنات الكلية (بما في ذلك الشحنة الأولى) التي يحتاجها لتشكيل مربع كامل.</li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row gap-4 mt-4">
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Example Input</div>
                                        <div>60 <span className="text-slate-500 text-[10px] ml-2">// Boxes in one shipment</span></div>
                                    </div>
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Expected Output</div>
                                        <div className="text-emerald-400">15</div>
                                        <div className="mt-2 text-slate-500 text-[10px] whitespace-pre-wrap">
                                            // He needs 15 shipments total.
                                            // 60 boxes × 15 shipments = 900 boxes.
                                            // 900 is a perfect square (30 × 30).
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderConcept = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">المفهوم الرياضي (التحليل للعوامل الأولية)</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-3">
                                    <h3 className="text-sm font-bold text-slate-700 bg-slate-200 p-2 rounded">متى يكون الرقم "مربعاً كاملاً"؟</h3>
                                    <p className="text-xs text-slate-700 leading-relaxed">
                                        في الرياضيات، أي رقم يمكن تفكيكه إلى "عوامل أولية" (Prime Factors) مضروبة في بعضها. 
                                        لكي يكون الرقم مربعاً كاملاً (Perfect Square)، <strong>يجب أن يكون الأس (Count) لكل عامل أولي عدداً زوجياً (Even).</strong>
                                    </p>
                                    <div className="bg-white border border-slate-200 p-3 rounded text-xs font-mono shadow-sm" dir="ltr">
                                        <div className="text-emerald-700 font-bold mb-1 border-b pb-1">Example: 36 (Perfect Square)</div>
                                        <div className="text-slate-600">36 = 2 × 2 × 3 × 3</div>
                                        <div className="text-slate-800 font-bold mt-1">36 = 2<sup className="text-emerald-500">2</sup> × 3<sup className="text-emerald-500">2</sup></div>
                                        <div className="text-[10px] text-slate-400 mt-1">// Both exponents (2) are even.</div>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-sm font-bold text-slate-700 bg-amber-100 p-2 rounded">تشخيص حالة العدد 60</h3>
                                    <p className="text-xs text-slate-700 leading-relaxed">
                                        العدد <code dir="ltr" className="font-mono mx-1">N = 60</code> ليس مربعاً كاملاً. دعونا نفككه لنرى أين الخلل:
                                    </p>
                                    <div className="bg-amber-50 border border-amber-200 p-4 rounded text-center shadow-inner" dir="ltr">
                                        <div className="text-sm font-mono font-bold text-slate-800">
                                            60 = 2<sup className="text-emerald-500 text-lg">2</sup> × 3<sup className="text-rose-500 text-lg">1</sup> × 5<sup className="text-rose-500 text-lg">1</sup>
                                        </div>
                                    </div>
                                    <p className="text-[11px] text-slate-600 leading-relaxed">
                                        - العامل <strong className="text-emerald-600">2</strong> لديه أس زوجي (2) <i className="fa-solid fa-check text-emerald-500"></i> سليم.<br/>
                                        - العامل <strong className="text-rose-600">3</strong> لديه أس فردي (1) <i className="fa-solid fa-xmark text-rose-500"></i> يحتاج شريكاً (× 3).<br/>
                                        - العامل <strong className="text-rose-600">5</strong> لديه أس فردي (1) <i className="fa-solid fa-xmark text-rose-500"></i> يحتاج شريكاً (× 5).<br/>
                                    </p>
                                    <div className="bg-indigo-50 border border-indigo-200 p-2 rounded text-xs text-indigo-800 font-bold text-center">
                                        إذن، لترقيع النواقص نضرب: 3 × 5 = 15.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderStrategy = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-6">
                        <div className="bg-white p-6 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2 flex items-center gap-2">
                                <i className="fa-solid fa-chess-knight"></i> استراتيجية الحل البرمجية
                            </h2>
                            <p className="text-sm text-slate-600 mb-6">الحل البرمجي يعتمد على محاكاة عملية "التحليل للعوامل الأولية" بثلاث مراحل متتالية وفعالة جداً (بدون الحاجة لمصفوفات ضخمة).</p>
                            
                            <div className="space-y-5 text-sm text-slate-700 leading-relaxed">
                                
                                <div className="bg-blue-50/50 p-4 rounded border border-blue-100">
                                    <h3 className="font-bold text-blue-900 mb-2 flex items-center gap-2">
                                        <span className="bg-blue-200 text-blue-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">1</span>
                                        المرحلة الأولى: تصفية الرقم 2 (الزوجي الوحيد)
                                    </h3>
                                    <p className="mb-2 text-xs">نقسم الرقم <code dir="ltr" className="font-mono mx-1">n</code> على 2 طالما أنه يقبل القسمة، ونزيد عداداً (Count). بعد الانتهاء من القسمة، نفحص العداد: إذا كان فردياً <code dir="ltr" className="font-mono text-[10px] mx-1">(count % 2 != 0)</code>، فهذا يعني أننا نحتاج لضرب الـ <code dir="ltr" className="font-mono mx-1 text-indigo-700">multiplier</code> في 2 لتعويض النقص.</p>
                                </div>

                                <div className="bg-purple-50/50 p-4 rounded border border-purple-100">
                                    <h3 className="font-bold text-purple-900 mb-2 flex items-center gap-2">
                                        <span className="bg-purple-200 text-purple-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">2</span>
                                        المرحلة الثانية: استهداف العوامل الفردية
                                    </h3>
                                    <p className="mb-2 text-xs">
                                        نبدأ حلقة تكرار من <code dir="ltr" className="font-mono mx-1">i = 3</code> ونزيد بمقدار 2 في كل خطوة (3، 5، 7...). 
                                        الشرط الذكي هنا هو التوقف عند <code dir="ltr" className="font-mono font-bold mx-1">i * i &lt;= n</code> (الجذر التربيعي) لتوفير الوقت. 
                                        نفس المنطق السابق يطبق: نقسم، نعد، وإذا كان العداد فردياً نضرب الـ Multiplier في <code dir="ltr" className="font-mono mx-1">i</code>.
                                    </p>
                                </div>

                                <div className="bg-emerald-50/50 p-4 rounded border border-emerald-100">
                                    <h3 className="font-bold text-emerald-900 mb-2 flex items-center gap-2">
                                        <span className="bg-emerald-200 text-emerald-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">3</span>
                                        المرحلة الثالثة: البقية (The Remaining Prime)
                                    </h3>
                                    <p className="mb-2 text-xs">
                                        بعد انتهاء الحلقتين السابقتين، إذا تبقى من الرقم الأصلي <code dir="ltr" className="font-mono mx-1">n</code> قيمة أكبر من 2، فهذا يعني رياضياً أن هذه القيمة المتبقية هي "عامل أولي" بحد ذاته، وأسه هو (1) أي فردي.
                                        لذلك نقوم مباشرة بضرب الـ Multiplier في هذه القيمة المتبقية كخطوة أخيرة.
                                    </p>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderVisualizer = () => {
                const s = stepsRef.current[stepIdx].state;
                const currentStepInfo = stepsRef.current[stepIdx];

                return (
                    <div className="flex flex-col lg:flex-row h-full bg-slate-100 fade-in overflow-hidden">
                        
                        {/* Control Panel */}
                        <div className="w-full lg:w-1/3 bg-white border-l border-slate-200 shadow-lg z-20 flex flex-col">
                            <div className="p-3 bg-slate-800 text-white border-b border-slate-700">
                                <h2 className="text-sm font-bold">مختبر التحليل (Factorization)</h2>
                                <p className="text-[10px] text-slate-400">انقر لاستخراج العوامل وتعويض النواقص.</p>
                            </div>
                            
                            <div className="p-4 flex-1 overflow-y-auto space-y-4">
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-slate-800 mb-1 border-b border-slate-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-check-circle text-emerald-600"></i> ماذا حدث للتو؟
                                    </h3>
                                    <p className="text-xs text-slate-700 leading-relaxed mt-2">{currentStepInfo.happened}</p>
                                </div>

                                <div className="bg-indigo-50 border border-indigo-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-indigo-900 mb-1 border-b border-indigo-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left text-indigo-600"></i> ماذا سيحدث الآن؟
                                    </h3>
                                    <p className="text-xs text-indigo-800 leading-relaxed mt-2">{currentStepInfo.next}</p>
                                </div>
                            </div>

                            <div className="p-4 bg-slate-50 border-t border-slate-200">
                                <button 
                                    onClick={() => setStepIdx(Math.min(stepsRef.current.length - 1, stepIdx + 1))} 
                                    disabled={stepIdx === stepsRef.current.length - 1}
                                    className="w-full py-3 rounded bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold text-sm shadow transition flex items-center justify-center gap-2"
                                >
                                    {stepIdx === stepsRef.current.length - 1 ? 'انتهى التنفيذ' : 'تنفيذ الخطوة التالية'}
                                    {stepIdx < stepsRef.current.length - 1 && <i className="fa-solid fa-play text-xs"></i>}
                                </button>
                                
                                <div className="flex justify-between mt-3">
                                    <button onClick={() => setStepIdx(0)} disabled={stepIdx === 0} className="text-xs text-slate-500 hover:text-slate-800 transition disabled:opacity-50 flex items-center gap-1">
                                        <i className="fa-solid fa-rotate-right"></i> إعادة من البداية
                                    </button>
                                    <span className="text-xs font-mono text-slate-400 bg-slate-200 px-2 py-0.5 rounded">
                                        خطوة {stepIdx + 1} / {stepsRef.current.length}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Visual Area */}
                        <div className="flex-1 p-4 flex flex-col items-center justify-start bg-slate-100 overflow-y-auto relative" dir="ltr">
                            
                            {/* Main Variables */}
                            <div className="w-full max-w-lg flex gap-4 mb-6 mt-4 fade-in">
                                <div className="flex-1 bg-white p-4 rounded shadow border border-slate-200 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                                    <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Remaining (N)</h3>
                                    <div className="text-4xl font-black font-mono text-slate-800 pop-in key={s.n}">{s.n}</div>
                                </div>
                                <div className="flex-1 bg-slate-800 text-white p-4 rounded shadow border border-slate-700 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-yellow-400"></div>
                                    <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Multiplier</h3>
                                    <div className="text-4xl font-black font-mono text-yellow-400 pop-in key={s.mult}">{s.mult}</div>
                                </div>
                            </div>

                            {/* Active Processing Box */}
                            {s.phase !== 'start' && s.phase !== 'done' && (
                                <div className="w-full max-w-lg bg-indigo-50 border border-indigo-200 p-4 rounded shadow-sm mb-6 flex items-center justify-between fade-in">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] text-indigo-500 font-bold uppercase tracking-wider mb-1">Currently Testing</span>
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl font-black font-mono text-indigo-800 bg-white px-3 py-1 rounded shadow-sm border border-indigo-100">{s.currPrime || 'Remaining N'}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col items-end">
                                        <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Division Count</span>
                                        <span className="text-xl font-bold font-mono text-slate-700 bg-white px-3 py-1 rounded border border-slate-200">{s.count}</span>
                                    </div>
                                </div>
                            )}

                            {/* Extracted Factors Visualization */}
                            <div className="w-full max-w-lg bg-white p-4 rounded shadow border border-slate-200 relative fade-in">
                                <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b pb-2 text-center">Extracted Prime Factors</h3>
                                
                                <div className="flex flex-wrap gap-2 justify-center min-h-[48px]">
                                    {s.factors.length === 0 && <span className="text-slate-400 text-xs italic mt-2">No factors extracted yet...</span>}
                                    
                                    {/* Group identical factors visually */}
                                    {Array.from(new Set(s.factors)).map((uniqueFactor, idx) => {
                                        const countOfThis = s.factors.filter(f => f === uniqueFactor).length;
                                        const isEven = countOfThis % 2 === 0;
                                        
                                        // Highlight logic based on phase
                                        let alertClass = "";
                                        if (s.phase === 'evalOdd_Fail' && uniqueFactor === 3) alertClass = "ring-4 ring-rose-300 animate-pulse";
                                        if (s.phase === 'evalRem' && uniqueFactor === 5) alertClass = "ring-4 ring-rose-300 animate-pulse";

                                        return (
                                            <div key={idx} className={`flex bg-slate-50 rounded border border-slate-200 p-1 gap-1 items-center ${alertClass}`}>
                                                {/* Render blocks for each occurrence */}
                                                {Array(countOfThis).fill(0).map((_, i) => (
                                                    <div key={i} className={`w-8 h-8 flex items-center justify-center font-bold font-mono text-sm rounded shadow-sm pop-in ${isEven ? 'bg-emerald-100 text-emerald-800 border border-emerald-300' : 'bg-rose-100 text-rose-800 border border-rose-300'}`}>
                                                        {uniqueFactor}
                                                    </div>
                                                ))}
                                                {/* Visual indicator of partnership */}
                                                <div className="text-[10px] font-bold text-slate-400 ml-1 mr-1">
                                                    {isEven ? <i className="fa-solid fa-link text-emerald-500"></i> : <i className="fa-solid fa-link-slash text-rose-400"></i>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            {/* Final Success State */}
                            {s.phase === 'done' && (
                                <div className="w-full max-w-lg mt-6 bg-emerald-50 border-2 border-emerald-500 p-4 rounded-lg shadow-lg text-center pop-in">
                                    <h2 className="text-emerald-800 font-bold mb-2"><i className="fa-solid fa-box-open mr-2"></i>Perfect Square Achieved!</h2>
                                    <div className="font-mono text-sm text-emerald-700 bg-white p-2 rounded border border-emerald-200 inline-block">
                                        60 × <span className="font-black text-emerald-900 bg-emerald-200 px-1 rounded">15</span> = 900 = 30²
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                );
            };

            const renderCode = () => {
                const codeSegments = [
                    {
                        title: "1. الدالة الأساسية ومتغير النتيجة",
                        desc: "نعرّف دالة تستقبل الرقم n وترجع أصغر مُعامل (multiplier) نحتاجه. نبدأ بقيمة افتراضية 1.",
                        code: `int findSmallestMultiplier(int n) {\n    int multiplier = 1;`
                    },
                    {
                        title: "2. فحص الرقم الزوجي (2)",
                        desc: "نستخدم حلقة while لقسمة n على 2 بشكل متكرر وتحديث العداد. إذا انتهت القسمة وكان العداد فردياً، نضرب الـ multiplier في 2 لتعويض النقص.",
                        code: `    // Step 1: Check for divisibility by 2\n    int count = 0;\n    while (n % 2 == 0) {\n        count++;\n        n /= 2;\n    }\n    // If the count of 2s is odd, we need one more 2\n    if (count % 2 != 0) {\n        multiplier *= 2;\n    }`
                    },
                    {
                        title: "3. فحص الأرقام الفردية (3, 5, 7...)",
                        desc: "نبدأ حلقة for من 3 وبزيادة 2 لتخطي الأرقام الزوجية. نتوقف عند الجذر التربيعي (i * i <= n) لتقليل وقت البحث. بنفس الطريقة: نقسم، نعد، وإذا كان فردياً نعوض في multiplier.",
                        code: `    // Step 2: Check for odd factors (3, 5, 7, ...)\n    for (int i = 3; i * i <= n; i += 2) {\n        count = 0;\n        while (n % i == 0) {\n            count++;\n            n /= i;\n        }\n        // If the count of this factor is odd, we need one more\n        if (count % 2 != 0) {\n            multiplier *= i;\n        }\n    }`
                    },
                    {
                        title: "4. معالجة العدد الأولي المتبقي",
                        desc: "إذا تبقى من الرقم الأصلي قيمة أكبر من 2، فهذا يمثل عاملاً أولياً لم يكتشف بسبب توقفنا عند الجذر. وبما أنه متبقٍ وحيد، فأسّه (1) فردي، فنضربه مباشرة.",
                        code: `    // Step 3: Handle the remaining prime number\n    if (n > 2) {\n        multiplier *= n;\n    }\n    return multiplier;\n}`
                    },
                    {
                        title: "5. دالة التشغيل الرئيسية",
                        desc: "نقرأ المدخل، ننادي دالتنا السحرية، ونطبع النتيجة التي تمثل عدد الشحنات الكلية المطلوبة لتكوين المستودع المربع.",
                        code: `int main() {\n    int n;\n    cin >> n;\n    int necessary_shipments = findSmallestMultiplier(n);\n    cout << necessary_shipments << "\\n";\n    return 0;\n}`
                    }
                ];

                return (
                    <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                        <div className="max-w-6xl mx-auto w-full space-y-4">
                            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm text-center">
                                <h2 className="text-lg font-bold text-slate-800">تفصيل الكود الأصلي والمجزء</h2>
                                <p className="text-xs text-slate-600 mt-1">
                                    الجهة اليسرى تحتوي على الكود الأصلي (دون أي تعديل). الجهة اليمنى تشرح للطالب ما الذي يحلّه هذا الجزء بالتحديد.
                                </p>
                            </div>

                            <div className="space-y-4">
                                {codeSegments.map((seg, idx) => (
                                    <div key={idx} className="flex flex-col md:flex-row bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
                                        
                                        <div className="w-full md:w-5/12 bg-slate-50 p-4 border-b md:border-b-0 md:border-l border-slate-200 flex flex-col justify-center">
                                            <h3 className="font-bold text-indigo-800 mb-2 text-sm">{seg.title}</h3>
                                            <p className="text-xs text-slate-700 leading-relaxed">{seg.desc}</p>
                                        </div>
                                        
                                        <div className="w-full md:w-7/12 bg-[#1e1e1e] p-4 overflow-x-auto" dir="ltr">
                                            <pre className="m-0">
                                                <code className="text-xs font-mono text-[#d4d4d4] whitespace-pre" style={{lineHeight: '1.6'}}>
                                                    {seg.code}
                                                </code>
                                            </pre>
                                        </div>

                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-slate-200">
                    <header className="bg-white px-4 py-3 shadow-sm z-30 flex flex-col md:flex-row md:items-center justify-between gap-3 border-b border-slate-200">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-indigo-700 rounded flex items-center justify-center text-white text-sm shadow">
                                <i className="fa-solid fa-boxes-stacked"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-bold text-slate-800 leading-tight">The Perfect Square Inventory</h1>
                                <p className="text-slate-500 text-[10px] font-semibold">التحليل للعوامل الأولية لتكوين المربع الكامل</p>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded border border-slate-200 gap-1 overflow-x-auto text-xs shadow-inner">
                            {['problem', 'concept', 'strategy', 'visualizer', 'code'].map((tabKey, idx) => {
                                const labels = ["1. المسألة الأصلية", "2. المفهوم الرياضي", "3. استراتيجية الحل", "4. التتبع البصري", "5. تفصيل الكود"];
                                return (
                                    <button 
                                        key={tabKey}
                                        onClick={() => setActiveTab(tabKey)} 
                                        className={`px-3 py-1.5 rounded font-bold transition-all whitespace-nowrap ${activeTab === tabKey ? 'bg-white text-indigo-800 shadow border border-slate-200' : 'text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {labels[idx]}
                                    </button>
                                )
                            })}
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden">
                        {activeTab === 'problem' && renderProblem()}
                        {activeTab === 'concept' && renderConcept()}
                        {activeTab === 'strategy' && renderStrategy()}
                        {activeTab === 'visualizer' && renderVisualizer()}
                        {activeTab === 'code' && renderCode()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
