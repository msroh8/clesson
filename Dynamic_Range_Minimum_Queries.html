<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شرح تقنية Square Root Decomposition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; font-size: 14px; }
        #root { height: 100%; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function generateSteps() {
            let steps = [];
            
            // Initial array of size 9, block size = 3
            let a = [5, 2, 8, 1, 9, 3, 7, 4, 6];
            let b = ['∞', '∞', '∞']; // block minimums

            const cloneState = (phase, arrA, arrB, hlA = [], hlB = [], ans = null, info = {}) => ({
                phase,
                a: [...arrA],
                b: [...arrB],
                hlA: [...hlA],
                hlB: [...hlB],
                ans,
                info
            });

            // 1. Initial State
            steps.push({
                happened: "بدأ البرنامج. لدينا مصفوفة A مكونة من 9 عناصر. تم حساب حجم البلوك (Block Size) كجذر لعدد العناصر، أي 3.",
                next: "سنقوم الآن ببناء المصفوفة المساعدة B، والتي ستحتوي على القيمة الصغرى (Minimum) لكل بلوك لتسريع الاستعلامات.",
                state: cloneState('build_start', a, b)
            });

            // 2. Building Phase
            b[0] = 2; // min(5,2,8)
            steps.push({
                happened: "قمنا بفحص البلوك الأول (الفهارس 0, 1, 2) المكون من [5, 2, 8]. القيمة الصغرى فيه هي 2، وسجلناها في b[0].",
                next: "سنفحص البلوك الثاني لاستخراج قيمته الصغرى.",
                state: cloneState('build', a, b, [0, 1, 2], [0])
            });

            b[1] = 1; // min(1,9,3)
            steps.push({
                happened: "البلوك الثاني (الفهارس 3, 4, 5) المكون من [1, 9, 3]. القيمة الصغرى هي 1، وسجلناها في b[1].",
                next: "سنفحص البلوك الثالث والأخير.",
                state: cloneState('build', a, b, [3, 4, 5], [1])
            });

            b[2] = 4; // min(7,4,6)
            steps.push({
                happened: "البلوك الثالث (الفهارس 6, 7, 8) المكون من [7, 4, 6]. القيمة الصغرى هي 4، وسجلناها في b[2].",
                next: "اكتمل بناء مصفوفة البلوكات! الآن نحن مستعدون لاستقبال استعلامات التحديث والبحث.",
                state: cloneState('build_done', a, b, [], [])
            });

            // 3. Update Query (Update index 4 to 0)
            steps.push({
                happened: "تلقينا استعلام تحديث (النوع 1): غيّر قيمة العنصر في الفهرس 4 لتصبح 0.",
                next: "سنحدث القيمة في المصفوفة A أولاً، ثم نعيد حساب البلوك الخاص بهذا الفهرس.",
                state: cloneState('update_start', a, b, [4], [], null, { type: 'Update', text: 'a[4] = 0' })
            });

            a[4] = 0;
            steps.push({
                happened: "تم تغيير a[4] لتصبح 0. الفهرس 4 يقع ضمن البلوك رقم 1.",
                next: "سنقوم بمسح عناصر البلوك رقم 1 بالكامل (الفهارس 3, 4, 5) لنجد القيمة الصغرى الجديدة.",
                state: cloneState('update_mid', a, b, [3, 4, 5], [1], null, { type: 'Update', text: 'Recomputing b[1]' })
            });

            b[1] = 0;
            steps.push({
                happened: "القيمة الصغرى الجديدة للبلوك رقم 1 هي 0 (min(1, 0, 3)). تم تحديث b[1] = 0.",
                next: "انتهى التحديث في وقت قصير جداً! الآن سنتلقى استعلام استخراج قيمة صغرى (Range Query).",
                state: cloneState('update_done', a, b, [], [1], null, { type: 'Ready', text: 'Waiting for queries...' })
            });

            // 4. Min Query (Range 1 to 7)
            steps.push({
                happened: "استعلام بحث (النوع 2): ما هي القيمة الصغرى في النطاق من الفهرس 1 إلى الفهرس 7؟",
                next: "المجال يمتد عبر عدة بلوكات. سنبحث في 'الأجزاء المقطوعة' من البلوكات الطرفية عنصرًا بعنصر، وسنقفز فوق 'البلوك الكامل' في المنتصف بفضل مصفوفة B.",
                state: cloneState('query_start', a, b, [1,2,3,4,5,6,7], [], '∞', { type: 'Query', text: 'Min in range [1, 7]' })
            });

            // Partial Left
            let currMin = Math.min(a[1], a[2]);
            steps.push({
                happened: "الجزء الأيسر المقطوع (البلوك 0): نفحص العناصر من بداية النطاق 1 وحتى نهاية البلوك (الفهرس 2). القيمة الصغرى بين (a[1], a[2]) هي 2.",
                next: "سننتقل للمنطقة الوسطى (البلوكات الكاملة التي تقع بالكامل داخل نطاق البحث).",
                state: cloneState('query_left', a, b, [1, 2], [], currMin, { type: 'Query', text: 'Checking partial block 0' })
            });

            // Full Middle Block
            currMin = Math.min(currMin, b[1]);
            steps.push({
                happened: "المنطقة الوسطى (البلوك 1): يقع بالكامل داخل النطاق! بدلاً من فحص عناصره الثلاثة، نأخذ قيمته الصغرى الجاهزة b[1] = 0. القيمة الصغرى المؤقتة تصبح 0.",
                next: "سنفحص الجزء الأيمن المقطوع.",
                state: cloneState('query_mid', a, b, [], [1], currMin, { type: 'Query', text: 'Checking full block 1' })
            });

            // Partial Right
            currMin = Math.min(currMin, a[6], a[7]);
            steps.push({
                happened: "الجزء الأيمن المقطوع (البلوك 2): نفحص العناصر من بداية البلوك وحتى نهاية النطاق 7 (الفهارس 6, 7). لم نجد رقماً أصغر من 0.",
                next: "انتهى الاستعلام. سيتم طباعة النتيجة النهائية.",
                state: cloneState('query_right', a, b, [6, 7], [], currMin, { type: 'Query', text: 'Checking partial block 2' })
            });

            // Done
            steps.push({
                happened: `تمت طباعة النتيجة: القيمة الصغرى في النطاق [1, 7] هي ${currMin}. بفضل البلوكات، وفرنا الكثير من عمليات الفحص!`,
                next: "انتهى التتبع البصري. يمكنك إعادته من البداية.",
                state: cloneState('done', a, b, [], [], currMin, { type: 'Done', text: 'Answer Found!' })
            });

            return steps;
        }

        function App() {
            const [activeTab, setActiveTab] = useState('problem'); 
            const stepsRef = useRef(generateSteps());
            const [stepIdx, setStepIdx] = useState(0);

            const renderProblem = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">نص المسألة (Dynamic Range Minimum Queries)</h2>
                            
                            <div className="text-sm space-y-4 text-slate-700 leading-relaxed">
                                <p className="font-semibold bg-slate-100 p-4 rounded border border-slate-200 shadow-inner">
                                    لديك مصفوفة تتكون من <span dir="ltr" className="font-mono text-indigo-700 font-bold mx-1">n</span> عنصر، وسيطلب منك تنفيذ <span dir="ltr" className="font-mono font-bold mx-1">q</span> استعلام عليها. كل استعلام يكون من أحد النوعين التاليين:
                                </p>
                                
                                <ul className="list-disc list-inside space-y-2 text-xs text-slate-700 bg-white p-4 border border-slate-200 rounded">
                                    <li><strong className="text-rose-600">تحديث (Type 1):</strong> تحديث وتغيير القيمة في الموقع (الفهرس) <code className="font-mono">k</code> لتصبح <code className="font-mono">u</code>.</li>
                                    <li><strong className="text-emerald-600">بحث (Type 2):</strong> ما هي القيمة الصغرى (Minimum) في النطاق من الموقع <code className="font-mono">l</code> إلى الموقع <code className="font-mono">r</code> (شاملاً)؟</li>
                                </ul>

                                <div className="bg-amber-50 border border-amber-200 p-3 rounded text-xs text-amber-900 shadow-sm">
                                    <strong className="block mb-1">ملاحظة هامة جداً بخصوص الفهارس (0-Indexed vs 1-Indexed):</strong>
                                    المدخلات في هذه المسألة تعتمد على الترقيم بدءاً من 1. ولكن في البرمجة وتحديداً في لغة C++، المصفوفات تبدأ من 0. لذلك في الكود سترى أننا نطرح 1 من المدخلات:
                                    <code className="block mt-1 font-mono text-indigo-700 font-bold" dir="ltr">k--;  l--;  r--;</code>
                                </div>

                                <div className="flex flex-col md:flex-row gap-4 mt-4">
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Example Input</div>
                                        <div>8 4 <span className="text-slate-500 text-[10px] ml-2">// Array of 8, 4 Queries</span></div>
                                        <div>3 2 4 5 1 1 5 3</div>
                                        <div>2 1 4 <span className="text-slate-500 text-[10px] ml-2">// Min in range [1, 4]</span></div>
                                        <div>2 5 6 <span className="text-slate-500 text-[10px] ml-2">// Min in range [5, 6]</span></div>
                                        <div>1 2 3 <span className="text-slate-500 text-[10px] ml-2">// Update index 2 to value 3</span></div>
                                        <div>2 1 4 <span className="text-slate-500 text-[10px] ml-2">// Min in range [1, 4] again</span></div>
                                    </div>
                                    <div className="flex-1 bg-[#1e1e1e] text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-2 border-b border-slate-600 pb-1">// Expected Output</div>
                                        <div className="text-emerald-400">2</div>
                                        <div className="text-emerald-400">1</div>
                                        <div className="text-emerald-400">3</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderConcept = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">فهم تحليل الجذر التربيعي (Square Root Decomposition)</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-3">
                                    <h3 className="text-sm font-bold text-slate-700 bg-rose-100 p-2 rounded">لماذا الطرق العادية تفشل؟</h3>
                                    <p className="text-xs text-slate-700 leading-relaxed">
                                        إذا بحثنا بالطريقة العادية (حلقة تكرار تمر على كل عنصر من البداية للنهاية)، سيكون التحديث سريعاً جداً <code className="font-mono text-[10px] mx-1">O(1)</code>، لكن البحث سيكون بطيئاً جداً <code className="font-mono text-[10px] mx-1">O(N)</code> وقد يسبب Time Limit Exceeded (TLE) إذا كانت المصفوفة ضخمة وعدد الاستعلامات كبيراً.
                                    </p>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-sm font-bold text-slate-700 bg-emerald-100 p-2 rounded">الحل الوسط الذهبي</h3>
                                    <p className="text-xs text-slate-700 leading-relaxed">
                                        نحن نقسم المصفوفة الطويلة إلى مجموعة من الصناديق (Blocks). حجم الصندوق المثالي رياضياً لتقسيم الجهد هو <strong>الجذر التربيعي لعدد العناصر</strong> <code className="font-mono text-[10px] mx-1">sqrt(N)</code>.
                                        نحتفظ بالقيمة الصغرى لكل صندوق بشكل مسبق.
                                    </p>
                                    <div className="bg-white border border-slate-200 p-3 rounded text-xs shadow-sm">
                                        عند الاستعلام عن مجال واسع، لن نمر على كل عنصر! سنمر فقط على العناصر الفردية في الأطراف غير المكتملة للصناديق، أما الصناديق التي تقع بالكامل داخل المجال، سنأخذ قيمتها الجاهزة بـ "قفزة واحدة".
                                        هذا يجعل وقت البحث والتحديث متوازناً وسريعاً <code className="font-mono text-[10px] mx-1">O(√N)</code>.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderStrategy = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-4xl mx-auto w-full space-y-6">
                        <div className="bg-white p-6 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2 flex items-center gap-2">
                                <i className="fa-solid fa-chess-knight"></i> استراتيجية الحل البرمجية
                            </h2>
                            
                            <div className="space-y-5 text-sm text-slate-700 leading-relaxed">
                                
                                <div className="bg-blue-50/50 p-4 rounded border border-blue-100">
                                    <h3 className="font-bold text-blue-900 mb-2 flex items-center gap-2">
                                        <span className="bg-blue-200 text-blue-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">1</span>
                                        دالة التحديث pointUpdate(j, v)
                                    </h3>
                                    <p className="mb-2 text-xs">
                                        يُطلب منا تغيير العنصر في الفهرس <code className="font-mono bg-white px-1 border rounded mx-1">j</code> إلى القيمة الجديدة <code className="font-mono bg-white px-1 border rounded mx-1">v</code>.
                                    </p>
                                    <ul className="list-disc list-inside space-y-1 text-xs pl-2">
                                        <li>نغير القيمة في المصفوفة الأساسية: <code className="font-mono">a[j] = v</code>.</li>
                                        <li>نعرف إلى أي بلوك ينتمي هذا الفهرس عبر المعادلة: <code className="font-mono text-indigo-700">blockJ = j / sz</code>.</li>
                                        <li>نمسح محتوى هذا البلوك فقط من البداية للنهاية لإيجاد القيمة الصغرى الجديدة ونحفظها في <code className="font-mono text-indigo-700">b[blockJ]</code>.</li>
                                    </ul>
                                </div>

                                <div className="bg-purple-50/50 p-4 rounded border border-purple-100">
                                    <h3 className="font-bold text-purple-900 mb-2 flex items-center gap-2">
                                        <span className="bg-purple-200 text-purple-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">2</span>
                                        دالة الاستعلام queryMin(l, r)
                                    </h3>
                                    <p className="mb-2 text-xs">
                                        نحدد البلوك الذي يقع فيه البداية <code className="font-mono">blockL</code> والبلوك الذي يقع فيه النهاية <code className="font-mono">blockR</code>. لدينا حالتان:
                                    </p>
                                    <div className="space-y-3 mt-3">
                                        <div className="bg-white p-3 rounded border border-slate-200 shadow-sm text-xs">
                                            <strong>الحالة الأولى:</strong> البداية والنهاية يقعان في <strong>نفس البلوك</strong> (<code className="font-mono">blockL == blockR</code>). هنا لا حاجة للقفز بالبلوكات، فقط نقوم بحلقة تكرار عادية من <code className="font-mono">l</code> إلى <code className="font-mono">r</code>.
                                        </div>
                                        <div className="bg-white p-3 rounded border border-slate-200 shadow-sm text-xs">
                                            <strong>الحالة الثانية:</strong> يقعان في <strong>بلوكات مختلفة</strong>. ونحلها بـ 3 خطوات:
                                            <ol className="list-decimal list-inside mt-2 space-y-1 text-slate-600">
                                                <li>حلقة للجزء الأيسر: من <code className="font-mono">l</code> إلى نهاية البلوك الأيسر.</li>
                                                <li>حلقة للبلوكات الوسطى (إن وجدت): تقفز بلوكاً بلوكاً وتقرأ القيمة الجاهزة من المصفوفة <code className="font-mono">b</code>.</li>
                                                <li>حلقة للجزء الأيمن: من بداية البلوك الأيمن وحتى <code className="font-mono">r</code>.</li>
                                            </ol>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderVisualizer = () => {
                const s = stepsRef.current[stepIdx].state;
                const currentStepInfo = stepsRef.current[stepIdx];

                return (
                    <div className="flex flex-col lg:flex-row h-full bg-slate-100 fade-in overflow-hidden">
                        
                        {/* Control Panel */}
                        <div className="w-full lg:w-1/3 bg-white border-l border-slate-200 shadow-lg z-20 flex flex-col">
                            <div className="p-3 bg-slate-800 text-white border-b border-slate-700">
                                <h2 className="text-sm font-bold">التتبع البصري (Square Root)</h2>
                                <p className="text-[10px] text-slate-400">انقر لتشغيل بناء البلوكات ثم الاستعلامات.</p>
                            </div>
                            
                            <div className="p-4 flex-1 overflow-y-auto space-y-4">
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-slate-800 mb-1 border-b border-slate-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-check-circle text-emerald-600"></i> ماذا حدث للتو؟
                                    </h3>
                                    <p className="text-xs text-slate-700 leading-relaxed mt-2">{currentStepInfo.happened}</p>
                                </div>

                                <div className="bg-indigo-50 border border-indigo-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-indigo-900 mb-1 border-b border-indigo-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left text-indigo-600"></i> ماذا سيحدث الآن؟
                                    </h3>
                                    <p className="text-xs text-indigo-800 leading-relaxed mt-2">{currentStepInfo.next}</p>
                                </div>
                            </div>

                            <div className="p-4 bg-slate-50 border-t border-slate-200">
                                <button 
                                    onClick={() => setStepIdx(Math.min(stepsRef.current.length - 1, stepIdx + 1))} 
                                    disabled={stepIdx === stepsRef.current.length - 1}
                                    className="w-full py-3 rounded bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold text-sm shadow transition flex items-center justify-center gap-2"
                                >
                                    {stepIdx === stepsRef.current.length - 1 ? 'انتهى التنفيذ' : 'تنفيذ الخطوة التالية'}
                                    {stepIdx < stepsRef.current.length - 1 && <i className="fa-solid fa-play text-xs"></i>}
                                </button>
                                
                                <div className="flex justify-between mt-3">
                                    <button onClick={() => setStepIdx(0)} disabled={stepIdx === 0} className="text-xs text-slate-500 hover:text-slate-800 transition disabled:opacity-50 flex items-center gap-1">
                                        <i className="fa-solid fa-rotate-right"></i> إعادة من البداية
                                    </button>
                                    <span className="text-xs font-mono text-slate-400 bg-slate-200 px-2 py-0.5 rounded">
                                        خطوة {stepIdx + 1} / {stepsRef.current.length}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Visual Area */}
                        <div className="flex-1 p-4 flex flex-col items-center justify-start bg-slate-100 overflow-y-auto relative" dir="ltr">
                            
                            {/* Current Action Indicator */}
                            {s.info && s.info.type && (
                                <div className="w-full max-w-2xl mb-4 bg-slate-800 text-white p-3 rounded shadow flex items-center gap-3 fade-in">
                                    <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${s.info.type === 'Update' ? 'bg-rose-500' : s.info.type === 'Query' ? 'bg-emerald-500' : 'bg-indigo-500'}`}>
                                        {s.info.type}
                                    </span>
                                    <span className="font-mono text-sm">{s.info.text}</span>
                                </div>
                            )}

                            {/* Main Arrays Visual */}
                            <div className="w-full max-w-2xl bg-white p-6 rounded shadow border border-slate-200 mb-6">
                                
                                {/* Array A */}
                                <div className="mb-8">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 text-center border-b pb-2">Array A (Elements)</h3>
                                    <div className="flex justify-center gap-1 flex-wrap">
                                        {s.a.map((val, idx) => {
                                            const isHighlighted = s.hlA.includes(idx);
                                            const blockColor = Math.floor(idx / 3) % 2 === 0 ? 'bg-slate-50' : 'bg-slate-100'; // alternating blocks visually
                                            
                                            let style = `${blockColor} border-slate-300 text-slate-600`;
                                            if (isHighlighted) style = "bg-indigo-500 text-white border-indigo-600 shadow-md font-bold scale-110 z-10 pop-in";
                                            if (s.phase === 'query_start' && idx >= 1 && idx <= 7) style = "bg-emerald-100 border-emerald-400 text-emerald-800 shadow-inner";

                                            return (
                                                <div key={`a${idx}`} className="flex flex-col items-center">
                                                    <span className="text-[10px] text-slate-400 mb-1">{idx}</span>
                                                    <div className={`w-10 h-10 flex items-center justify-center rounded border transition-all duration-300 text-lg font-mono ${style}`}>
                                                        {val}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>

                                {/* Array B (Blocks) */}
                                <div>
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 text-center border-b pb-2">Array B (Block Minimums)</h3>
                                    <div className="flex justify-center gap-8">
                                        {s.b.map((val, idx) => {
                                            const isHighlighted = s.hlB.includes(idx);
                                            
                                            let style = "bg-indigo-50 border-indigo-200 text-indigo-700";
                                            if (val === '∞') style = "bg-slate-100 border-slate-200 text-slate-300";
                                            if (isHighlighted) style = "bg-rose-500 text-white border-rose-600 shadow-md font-bold scale-110 z-10 pop-in";
                                            
                                            return (
                                                <div key={`b${idx}`} className="flex flex-col items-center">
                                                    <span className="text-[10px] text-slate-400 mb-1">Block {idx}</span>
                                                    <div className={`w-14 h-12 flex items-center justify-center rounded-lg border-2 transition-all duration-300 text-xl font-mono ${style}`}>
                                                        {val}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>

                            </div>

                            {/* Answer Box */}
                            {s.ans !== null && (
                                <div className="fixed top-4 right-4 bg-emerald-50 text-emerald-800 p-4 rounded-lg shadow-lg border-2 border-emerald-500 z-50 flex items-center gap-4 fade-in" dir="ltr">
                                    <div className="text-xs font-bold uppercase tracking-wider">Current Min:</div>
                                    <div className="text-3xl font-black font-mono">{s.ans}</div>
                                </div>
                            )}

                        </div>
                    </div>
                );
            };

            const renderCode = () => {
                const codeSegments = [
                    {
                        title: "1. الإعدادات والمتغيرات العامة",
                        desc: "نعرف المتغيرات في النطاق العام (Global). MAXN هو الحد الأقصى للمصفوفة، ونحسب sz وهو حجم البلوك (Block Size) ليكون الجذر التربيعي لـ MAXN. المصفوفة a للعناصر الأصلية و b لتحتفظ بالقيمة الصغرى لكل بلوك.",
                        code: `#include <iostream>\n#include <cmath>\n#include <climits>\nusing namespace std;\n\nconst int MAXN = 200000;\n// sz is the block size (square root of MAXN)\nconst int sz = (int)ceil(sqrt(MAXN));\nint a[MAXN];\nint b[sz];`
                    },
                    {
                        title: "2. دالة الاستعلام (queryMin) - البداية",
                        desc: "هذه الدالة تستقبل النطاق [l, r]. أولاً نحدد إلى أي بلوك ينتمي l (وهو blockL) وإلى أي بلوك ينتمي r (وهو blockR).",
                        code: `int queryMin(int l, int r) {\n    int blockL = l / sz;\n    int blockR = r / sz;\n    int ans = INT_MAX;`
                    },
                    {
                        title: "3. الاستعلام - الحالة الأولى (بلوك واحد)",
                        desc: "إذا كان البداية والنهاية يقعان داخل نفس البلوك، لا توجد قفزات. نقوم ببساطة بالدوران من l إلى r وحساب القيمة الصغرى.",
                        code: `    if (blockL == blockR) {\n         for(int i = l; i <= r; i++) {\n            ans = min(ans, a[i]);\n        }\n        return ans;\n    }`
                    },
                    {
                        title: "4. الاستعلام - الحالة الثانية (الجزء الأيسر المقطوع)",
                        desc: "إذا كانوا في بلوكات مختلفة، نبدأ بالجزء الأيسر. ندور من l وحتى نهاية البلوك الأيسر الذي يحويه (أي نصل إلى بداية البلوك التالي).",
                        code: `    // Left partial block\n    for (int i = l; i < (blockL + 1) * sz; i++) {\n        ans = min(ans, a[i]);\n    }`
                    },
                    {
                        title: "5. الاستعلام - الحالة الثانية (البلوكات الكاملة الوسطى)",
                        desc: "هنا يكمن السحر! البلوكات التي تقع بالكامل داخل المجال، لا نمر على عناصرها، بل نقفز بلوكاً تلو الآخر ونأخذ قيمتها الصغرى الجاهزة من المصفوفة b.",
                        code: `    // Middle full blocks (Fast jumping)\n    for (int i = blockL + 1; i < blockR ; i++) {\n        ans = min(ans, b[i]);\n    }`
                    },
                    {
                        title: "6. الاستعلام - الحالة الثانية (الجزء الأيمن المقطوع)",
                        desc: "أخيراً، نمر على الجزء الأيمن. نبدأ من بداية البلوك الأيمن وحتى الوصول إلى فهرس النهاية r، ثم نعيد الإجابة النهائية.",
                        code: `    // Right partial block\n    for (int i = blockR * sz; i <= r ; i++){\n        ans = min(ans , a[i]);\n    }\n    return ans;\n}`
                    },
                    {
                        title: "7. دالة التحديث (pointUpdate)",
                        desc: "عند تغيير قيمة الفهرس j إلى v. نغيرها في المصفوفة a أولاً. ثم نحدد بلوك هذا الفهرس. نعيد تعيين قيمة هذا البلوك في b إلى ما لا نهاية، ثم ندور على كل عناصر هذا البلوك حصراً لنحسب القيمة الصغرى الجديدة.",
                        code: `void pointUpdate(int j , int v){\n    int blockJ = j / sz;\n    a[j] = v;\n    \n    // Recompute the minimum for this specific block\n    b[blockJ] = INT_MAX;\n    for (int i = blockJ * sz; i < (blockJ + 1) * sz; i++) {\n        b[blockJ] = min(b[blockJ], a[i]);\n    }\n}`
                    },
                    {
                        title: "8. الدالة الرئيسية (البناء الأولي)",
                        desc: "نقرأ المدخلات. نملأ مصفوفة البلوكات b بالقيمة العظمى لتجهيزها، ثم نمر على المصفوفة a مرة واحدة، وكل عنصر نستخدمه لتحديث القيمة الصغرى للبلوك الذي ينتمي إليه (i / sz).",
                        code: `int main() {\n    int n, q;\n    cin >> n >> q;\n    for (int i = 0; i < n; i++) {\n        cin >> a[i];\n    }\n    // Initialize block array\n    for (int i = 0 ; i < sz; i++) {\n        b[i] = INT_MAX;\n    }\n    // Build the block array\n    for (int i = 0; i < n; i++) {\n        b[i / sz] = min(a[i], b[i / sz]);\n    }`
                    },
                    {
                        title: "9. تلقي الاستعلامات",
                        desc: "نقوم بتكرار q مرة لتلقي الاستعلامات. إذا كان من النوع 1 (تحديث)، نقرأ الفهرس والقيمة، ونطرح 1 من الفهرس ليطابق بدء المصفوفات من 0. وإذا كان من النوع 2 (بحث)، نقرأ l و r، ونطرح 1 منهما أيضاً ونطبع النتيجة.",
                        code: `    while (q--){\n        int type;\n        cin >> type;\n        if (type == 1){\n            int k , u;\n            cin >> k >> u;\n            k--; // Convert to 0-indexed\n            pointUpdate(k, u);\n        }\n        else{\n            int l , r;\n            cin >> l >> r;\n            l--; r--; // Convert to 0-indexed\n            cout << queryMin(l , r) << "\\n";\n        }\n    }\n}`
                    }
                ];

                return (
                    <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                        <div className="max-w-6xl mx-auto w-full space-y-4">
                            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm text-center">
                                <h2 className="text-lg font-bold text-slate-800">تفصيل الكود الأصلي والمجزء</h2>
                                <p className="text-xs text-slate-600 mt-1">
                                    الجهة اليسرى تحتوي على الكود الأصلي كما هو. الجهة اليمنى تشرح للطالب وظيفة كل مقطع برمجياً في سياق الخوارزمية.
                                </p>
                            </div>

                            <div className="space-y-4">
                                {codeSegments.map((seg, idx) => (
                                    <div key={idx} className="flex flex-col md:flex-row bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
                                        
                                        <div className="w-full md:w-5/12 bg-slate-50 p-4 border-b md:border-b-0 md:border-l border-slate-200 flex flex-col justify-center">
                                            <h3 className="font-bold text-indigo-800 mb-2 text-sm">{seg.title}</h3>
                                            <p className="text-xs text-slate-700 leading-relaxed">{seg.desc}</p>
                                        </div>
                                        
                                        <div className="w-full md:w-7/12 bg-[#1e1e1e] p-4 overflow-x-auto" dir="ltr">
                                            <pre className="m-0">
                                                <code className="text-xs font-mono text-[#d4d4d4] whitespace-pre" style={{lineHeight: '1.6'}}>
                                                    {seg.code}
                                                </code>
                                            </pre>
                                        </div>

                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-slate-200">
                    <header className="bg-white px-4 py-3 shadow-sm z-30 flex flex-col md:flex-row md:items-center justify-between gap-3 border-b border-slate-200">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-indigo-700 rounded flex items-center justify-center text-white text-sm shadow">
                                <i className="fa-solid fa-cube"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-bold text-slate-800 leading-tight">Dynamic Range Minimum</h1>
                                <p className="text-slate-500 text-[10px] font-semibold">Square Root Decomposition Technique</p>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded border border-slate-200 gap-1 overflow-x-auto text-xs shadow-inner">
                            {['problem', 'concept', 'strategy', 'visualizer', 'code'].map((tabKey, idx) => {
                                const labels = ["1. المسألة الأصلية", "2. الفكرة الرياضية", "3. استراتيجية الحل", "4. التتبع البصري", "5. تفصيل الكود"];
                                return (
                                    <button 
                                        key={tabKey}
                                        onClick={() => setActiveTab(tabKey)} 
                                        className={`px-3 py-1.5 rounded font-bold transition-all whitespace-nowrap ${activeTab === tabKey ? 'bg-white text-indigo-800 shadow border border-slate-200' : 'text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {labels[idx]}
                                    </button>
                                )
                            })}
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden">
                        {activeTab === 'problem' && renderProblem()}
                        {activeTab === 'concept' && renderConcept()}
                        {activeTab === 'strategy' && renderStrategy()}
                        {activeTab === 'visualizer' && renderVisualizer()}
                        {activeTab === 'code' && renderCode()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
