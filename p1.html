<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شرح خوارزمية Labyrinth المنهجي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; font-size: 14px; }
        #root { height: 100%; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .grid-cell-visual { transition: all 0.2s ease; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_GRID = [
            "########",
            "#.A#...#",
            "#.##.#B#",
            "#......#",
            "########"
        ];
        const ROWS = 5;
        const COLS = 8;
        const START = {r: 1, c: 2};
        const END = {r: 2, c: 6};

        function generateBFSSteps() {
            let steps = [];
            let queue = [];
            let visited = Array(ROWS).fill(0).map(() => Array(COLS).fill(false));
            let parent = Array(ROWS).fill(0).map(() => Array(COLS).fill(null));

            const cloneState = (curr = null, path = []) => ({
                q: [...queue],
                v: visited.map(row => [...row]),
                c: curr,
                p: [...path]
            });

            steps.push({
                happened: "البرنامج بدأ لتوه. لم نتحرك بعد، والطابور فارغ تماماً.",
                next: "سنقوم بوضع نقطة البداية (A) في طابور الانتظار لكي نبدأ منها الاستكشاف.",
                state: cloneState()
            });

            queue.push(START);
            visited[START.r][START.c] = true;

            steps.push({
                happened: "تم وضع الخلية (A) في الطابور وتم تعليمها كـ 'مُزارة' لتجنب العودة إليها.",
                next: "الآن ستبدأ حلقة الاستكشاف (while): سنسحب أول عنصر من الطابور لنقف عليه ونفحص جيرانه.",
                state: cloneState()
            });

            const dr = [-1, 1, 0, 0];
            const dc = [0, 0, -1, 1];
            let found = false;
            let path = [];

            while(queue.length > 0 && !found) {
                let curr = queue.shift();
                
                steps.push({
                    happened: `سحبنا الخلية ذات الإحداثيات (${curr.r}, ${curr.c}) من الطابور. نحن نقف عليها الآن (اللون الأصفر).`,
                    next: "سننظر في الاتجاهات الأربعة (أعلى، أسفل، يسار، يمين) للبحث عن خلايا صالحة للمشي ولم نزرها.",
                    state: cloneState(curr)
                });

                if (curr.r === END.r && curr.c === END.c) {
                    found = true;
                    steps.push({
                        happened: "وجدنا الهدف! الخلية الحالية هي نقطة النهاية (B).",
                        next: "سنخرج من حلقة البحث ونتوقف عن الاستكشاف، ثم نبدأ بتتبع المسار العكسي للعودة إلى (A).",
                        state: cloneState(curr)
                    });
                    break;
                }

                let addedCount = 0;
                for(let i=0; i<4; i++) {
                    let nr = curr.r + dr[i];
                    let nc = curr.c + dc[i];

                    if(nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && INITIAL_GRID[nr][nc] !== '#' && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        parent[nr][nc] = curr;
                        queue.push({r: nr, c: nc});
                        addedCount++;
                    }
                }

                if (addedCount > 0) {
                    steps.push({
                        happened: `وجدنا ${addedCount} خلايا متاحة حولنا. أضفناها للطابور وسجلنا من أي اتجاه أتينا إليها.`,
                        next: "سنعيد الكرة.. سنسحب الخلية التالية المتوفرة في الطابور لنكرر عملية الفحص.",
                        state: cloneState(curr)
                    });
                } else {
                    steps.push({
                        happened: "لم نجد أي جيران متاحين (إما جدران أو زرناها مسبقاً). طريق مسدود من هذه الجهة.",
                        next: "لا مشكلة، الطابور لا يزال فيه خلايا. سنسحب الخلية التالية.",
                        state: cloneState(curr)
                    });
                }
            }

            if (found) {
                let curr = END;
                while(curr.r !== START.r || curr.c !== START.c) {
                    path.push(curr);
                    curr = parent[curr.r][curr.c];
                }
                path.push(START);
                path.reverse();

                steps.push({
                    happened: "قمنا بتتبع الأب لكل خلية بدءاً من B حتى وصلنا إلى A، ثم عكسنا الحروف لنحصل على المسار الصحيح.",
                    next: "انتهى التنفيذ. البرنامج سيطبع YES، والمسافة، والحركات المطلوبة.",
                    state: cloneState(null, path)
                });
            }

            return steps;
        }

        function LabyrinthApp() {
            const [activeTab, setActiveTab] = useState('problem'); 
            const bfsStepsRef = useRef(generateBFSSteps());
            const [bfsStepIdx, setBfsStepIdx] = useState(0);

            const renderProblem = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-5xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2">نص المسألة الأصلي (CSES - Labyrinth)</h2>
                            
                            <div className="text-sm space-y-3 text-slate-700 leading-relaxed">
                                <p className="font-semibold">أُعطيت خريطة لمتاهة، ومهمتك إيجاد مسار من البداية إلى النهاية. يمكنك المشي يساراً ويميناً وأعلى وأسفل.</p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                    <div className="bg-slate-100 p-3 rounded border border-slate-200">
                                        <h3 className="font-bold text-indigo-700 mb-2 border-b border-slate-300 pb-1">المدخلات (Input)</h3>
                                        <p>السطر الأول: عددان صحيحان n و m — الارتفاع والعرض.</p>
                                        <p>ثم n أسطر: كل سطر يحتوي m حرفاً:</p>
                                        <ul className="list-none space-y-1 mt-2 font-mono text-xs">
                                            <li><span className="bg-white px-2 py-0.5 border rounded mr-2 text-slate-500">.</span> أرضية</li>
                                            <li><span className="bg-slate-300 px-2 py-0.5 border rounded mr-2 text-slate-700">#</span> جدار</li>
                                            <li><span className="bg-indigo-100 px-2 py-0.5 border rounded mr-2 text-indigo-700">A</span> البداية</li>
                                            <li><span className="bg-rose-100 px-2 py-0.5 border rounded mr-2 text-rose-700">B</span> النهاية</li>
                                        </ul>
                                        <p className="mt-2 text-xs italic text-slate-500">ملاحظة: يوجد بالضبط حرف A واحد وحرف B واحد.</p>
                                    </div>
                                    
                                    <div className="bg-slate-100 p-3 rounded border border-slate-200">
                                        <h3 className="font-bold text-indigo-700 mb-2 border-b border-slate-300 pb-1">المخرجات والقيود (Output & Constraints)</h3>
                                        <p>اطبع "YES" إذا كان هناك مسار، وإلا اطبع "NO".</p>
                                        <p className="mt-2">إذا كان هناك مسار، اطبع أيضاً:</p>
                                        <ul className="list-disc list-inside mt-1 space-y-1 text-xs">
                                            <li>طول أقصر مسار</li>
                                            <li>سلسلة تصف المسار باستخدام L, R, U, D (أي أقصر مسار مقبول)</li>
                                        </ul>
                                        <div className="mt-3 pt-2 border-t border-slate-300">
                                            <span className="font-bold text-rose-700">القيود:</span>
                                            <span className="font-mono ml-2">1 ≤ n, m ≤ 1000</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-4 flex gap-4">
                                    <div className="flex-1 bg-slate-800 text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-1 border-b border-slate-600 pb-1">Example Input:</div>
                                        <div>5 8</div>
                                        <div>########</div>
                                        <div>#.A#...#</div>
                                        <div>#.##.#B#</div>
                                        <div>#......#</div>
                                        <div>########</div>
                                    </div>
                                    <div className="flex-1 bg-slate-800 text-slate-300 p-3 rounded border border-slate-700 font-mono text-xs" dir="ltr">
                                        <div className="text-slate-400 mb-1 border-b border-slate-600 pb-1">Example Output:</div>
                                        <div className="text-emerald-400">YES</div>
                                        <div className="text-emerald-400">9</div>
                                        <div className="text-emerald-400">LDDRRRRRU</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderGridFormation = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-5xl mx-auto w-full space-y-4">
                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-2 text-indigo-800 border-b pb-2">كيف تشكلت الشبكة برمجياً؟ (المعطى والمستنتج)</h2>
                            <p className="text-sm text-slate-600 mb-4">هذا القسم يشرح للطالب كيف يقرأ الكمبيوتر النصوص ويحولها إلى مصفوفة يمكن البحث داخلها، وكيف يكتشف مكان A و B آلياً.</p>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <h3 className="text-sm font-bold text-slate-700 bg-slate-200 p-2 rounded">1. المُعطى الخام (Input Text)</h3>
                                    <p className="text-xs text-slate-600">النص كما يدخله المستخدم. الكمبيوتر يأخذ الرقمين الأولين كأبعاد، ثم يقرأ الأسطر المتبقية كسلاسل نصية (Strings).</p>
                                    <div className="bg-slate-900 text-slate-300 p-4 rounded font-mono text-sm leading-loose shadow-inner" dir="ltr">
                                        <div className="text-emerald-400">5 8 <span className="text-slate-500 text-xs ml-2">// n=5, m=8</span></div>
                                        <div>########</div>
                                        <div>#.A#...#</div>
                                        <div>#.##.#B#</div>
                                        <div>#......#</div>
                                        <div>########</div>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <h3 className="text-sm font-bold text-slate-700 bg-emerald-100 p-2 rounded">2. المُستنتج (2D Array Grid)</h3>
                                    <p className="text-xs text-slate-600">يقوم الكود بتخزين النصوص في مصفوفة ثنائية. الآن كل حرف له عنوان محدد برقم الصف `i` ورقم العمود `j`.</p>
                                    <div className="overflow-x-auto bg-white border border-slate-200 p-2 rounded shadow-sm" dir="ltr">
                                        <table className="w-full text-center border-collapse text-xs">
                                            <thead>
                                                <tr>
                                                    <th className="p-1 text-slate-400 font-normal border-b border-r border-transparent">i \ j</th>
                                                    {[0,1,2,3,4,5,6,7].map(j => <th key={j} className="p-1 text-emerald-600 font-bold border-b border-slate-200 bg-slate-50">{j}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {INITIAL_GRID.map((row, i) => (
                                                    <tr key={i}>
                                                        <th className="p-1 text-emerald-600 font-bold border-r border-slate-200 bg-slate-50">{i}</th>
                                                        {row.split('').map((char, j) => {
                                                            let bg = "bg-white"; let tc = "text-slate-400";
                                                            if (char === '#') { bg = "bg-slate-200"; tc = "text-slate-500"; }
                                                            else if (char === 'A') { bg = "bg-indigo-100"; tc = "text-indigo-700 font-bold"; }
                                                            else if (char === 'B') { bg = "bg-rose-100"; tc = "text-rose-700 font-bold"; }
                                                            return <td key={j} className={`p-1 border border-slate-100 ${bg} ${tc} font-mono`}>{char}</td>
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="bg-amber-50 border border-amber-200 p-3 rounded text-xs text-amber-900 mt-2">
                                        <strong className="block mb-1">كيف عرف الكود مكان A و B؟</strong>
                                        الكود يقوم بعمل حلقتين تكرار (for loops) يمر فيها على كل خلية. 
                                        عندما يجد <code>grid[i][j] == 'A'</code> يسجل الإحداثيات: <br/>
                                        <span className="font-mono font-bold text-indigo-700" dir="ltr">A = (1, 2)</span> و <span className="font-mono font-bold text-rose-700" dir="ltr">B = (2, 6)</span>.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderStrategy = () => (
                <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                    <div className="max-w-5xl mx-auto w-full space-y-6">
                        <div className="bg-white p-6 rounded border border-slate-200 shadow-sm">
                            <h2 className="text-lg font-bold mb-4 text-indigo-800 border-b pb-2 flex items-center gap-2">
                                <i className="fa-solid fa-chess-knight"></i> استراتيجية الحل المفصلة
                            </h2>
                            <p className="text-sm text-slate-600 mb-6">هذا القسم يشرح للطالب العقلية البرمجية وراء الحل، ولماذا تم اختيار هذه الأدوات تحديداً.</p>
                            
                            <div className="space-y-6 text-sm text-slate-700 leading-relaxed">
                                
                                {/* 1. لماذا BFS */}
                                <div className="bg-blue-50/50 p-4 rounded border border-blue-100">
                                    <h3 className="font-bold text-blue-900 mb-2 flex items-center gap-2">
                                        <span className="bg-blue-200 text-blue-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">1</span>
                                        لماذا خوارزمية BFS وليس DFS؟
                                    </h3>
                                    <p className="mb-2">في المتاهات، تكلفة الانتقال من مربع لآخر متساوية (نسميها شبكة غير موزونة - <span dir="ltr" className="font-mono text-xs mx-1">Unweighted Grid</span>). الخوارزمية المثالية هنا هي <strong dir="ltr" className="font-mono text-blue-700 mx-1">Breadth-First Search (BFS)</strong>.</p>
                                    <ul className="list-disc list-inside space-y-2 text-slate-600 pr-4">
                                        <li><strong dir="ltr" className="font-mono text-slate-800 mx-1">BFS</strong> تنتشر كالموجة؛ تفحص المربعات التي تبعد خطوة واحدة، ثم خطوتين، وهكذا. لذا <strong>أول مرة</strong> تصطدم فيها بالهدف <span dir="ltr" className="font-mono mx-1">(B)</span>، يكون هذا هو المسار الأقصر حتماً.</li>
                                        <li>لو استخدمنا <strong dir="ltr" className="font-mono text-rose-700 mx-1">DFS</strong> (البحث في العمق)، فقد نصل للهدف بعد الدوران في المتاهة بالكامل، ولن نضمن أبداً أنه المسار الأقصر.</li>
                                    </ul>
                                </div>

                                {/* 2. أدوات التتبع */}
                                <div className="bg-emerald-50/50 p-4 rounded border border-emerald-100">
                                    <h3 className="font-bold text-emerald-900 mb-2 flex items-center gap-2">
                                        <span className="bg-emerald-200 text-emerald-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">2</span>
                                        أدوات التتبع الأساسية (حفظ الحالة)
                                    </h3>
                                    <p className="mb-3">لكي لا ندور في حلقات مفرغة، ولكي نستطيع معرفة طول المسار وكيفية العودة، نحتاج إلى مصفوفتين بحجم المتاهة:</p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white p-3 rounded border-b-4 border-emerald-400 shadow-sm">
                                            <div dir="ltr" className="font-mono font-bold text-indigo-700 mb-1 text-left">dist[r][c]</div>
                                            <p className="text-xs font-bold text-slate-800 mb-1 border-b pb-1">مصفوفة المسافات</p>
                                            <p className="text-xs text-slate-600 leading-relaxed mt-2">تبدأ جميع القيم بـ <code dir="ltr" className="text-rose-600 font-bold bg-rose-50 px-1 rounded">-1</code> (يعني لم نزُرها بعد). البداية <span dir="ltr" className="font-mono text-[10px]">(A)</span> تأخذ المسافة <code dir="ltr" className="text-emerald-600 font-bold bg-emerald-50 px-1 rounded">0</code>. أي خلية جديدة نكتشفها تأخذ مسافة الخلية السابقة <span dir="ltr" className="font-mono text-[10px]">+ 1</span>.</p>
                                            <p className="text-[11px] mt-2 bg-slate-50 p-1 border border-slate-100 rounded text-slate-700"><strong>فائدتها:</strong> تمنع زيارة الخلية مرتين (إذا كانت لا تساوي -1 نتجاهلها)، وتحتفظ بطول المسار.</p>
                                        </div>
                                        <div className="bg-white p-3 rounded border-b-4 border-emerald-400 shadow-sm">
                                            <div dir="ltr" className="font-mono font-bold text-indigo-700 mb-1 text-left">parDir[r][c]</div>
                                            <p className="text-xs font-bold text-slate-800 mb-1 border-b pb-1">مصفوفة الاتجاهات (فتات الخبز)</p>
                                            <p className="text-xs text-slate-600 leading-relaxed mt-2">تحفظ <strong>"من أي اتجاه دخلنا لهذه الخلية؟"</strong> باستخدام الحروف <code dir="ltr" className="bg-slate-100 px-1 rounded text-slate-700 font-bold">L, R, U, D</code>. إذا تحركت يميناً لدخول الخلية، نسجل <code dir="ltr" className="text-indigo-600 font-bold bg-indigo-50 px-1 rounded">'R'</code>.</p>
                                            <p className="text-[11px] mt-2 bg-slate-50 p-1 border border-slate-100 rounded text-slate-700"><strong>فائدتها:</strong> بدونها سنعرف المسافة الإجمالية لكن لن نستطيع طباعة المسار الفعلي (الحروف) للوصول للهدف.</p>
                                        </div>
                                    </div>
                                </div>

                                {/* 3. حلقة البحث */}
                                <div className="bg-amber-50/50 p-4 rounded border border-amber-100">
                                    <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                        <span className="bg-amber-200 text-amber-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">3</span>
                                        آلية عمل الطابور (Queue)
                                    </h3>
                                    <p className="text-slate-700 mb-2">الطابور يعمل بمبدأ "الداخل أولاً يخرج أولاً" <span dir="ltr" className="font-mono text-xs bg-amber-100 px-1 rounded text-amber-900">(FIFO)</span>.</p>
                                    <ol className="list-decimal list-inside space-y-2 text-slate-600 pr-2 bg-white p-3 rounded border border-amber-200">
                                        <li>نضع البداية <span dir="ltr" className="font-mono text-xs mx-1">(A)</span> في الطابور.</li>
                                        <li>طالما الطابور ليس فارغاً، نسحب أول خلية منه (نقف عليها الآن).</li>
                                        <li>ننظر حولها في الاتجاهات الأربعة <span dir="ltr" className="font-mono text-[11px] mx-1 bg-slate-100 px-1 rounded">(Up, Down, Left, Right)</span>.</li>
                                        <li>إذا وجدنا جاراً صالحاً (ليس جداراً <code dir="ltr" className="mx-1">#</code>، ولم يسبق زيارته <code dir="ltr" className="text-xs mx-1">dist == -1</code>، وضمن حدود المتاهة): 
                                            <span className="block mt-1 text-indigo-700 bg-indigo-50 p-1 rounded text-xs border border-indigo-100 mr-5">
                                                نضيفه للطابور، ونسجل مسافته (مسافة الحالي + 1)، ونسجل الحرف الذي تحركنا به إليه في <span dir="ltr" className="font-mono mx-1">parDir</span>.
                                            </span>
                                        </li>
                                    </ol>
                                </div>

                                {/* 4. بناء المسار العكسي */}
                                <div className="bg-purple-50/50 p-4 rounded border border-purple-100">
                                    <h3 className="font-bold text-purple-900 mb-2 flex items-center gap-2">
                                        <span className="bg-purple-200 text-purple-800 w-6 h-6 flex items-center justify-center rounded-full text-xs">4</span>
                                        إعادة بناء المسار (المرحلة الأهم)
                                    </h3>
                                    <p className="mb-2 text-slate-700">وصلنا إلى النهاية <span dir="ltr" className="font-mono mx-1">(B)</span>! لدينا الآن طول المسار محفوظ في <code dir="ltr" className="font-mono text-xs text-purple-700 bg-white px-1 border rounded mx-1">dist[B]</code>. كيف نطبع الحروف المتتالية مثل <code dir="ltr" className="font-mono text-xs font-bold mx-1">LDDR...</code>؟</p>
                                    <div className="bg-white p-3 rounded border border-purple-200 text-slate-700">
                                        <p className="mb-3 font-semibold text-indigo-800 border-b border-purple-100 pb-2">نستخدم مصفوفة <code dir="ltr" className="font-mono text-xs mx-1">parDir</code> للعودة إلى الخلف خطوة بخطوة من (B) وحتى نصل إلى (A):</p>
                                        <ul className="list-disc list-inside space-y-2 text-xs pr-2">
                                            <li>نقف عند <span dir="ltr" className="font-mono mx-1">(B)</span>، وننظر إلى <code dir="ltr" className="font-mono text-indigo-700 mx-1">parDir[B]</code>. لنفترض أننا وجدنا الحرف <code dir="ltr" className="font-mono font-bold text-rose-600 bg-rose-50 px-1 rounded mx-1">'D'</code>.</li>
                                            <li>هذا الحرف يعني أننا <strong>"نزلنا للأسفل"</strong> للوصول إلى هذه الخلية. إذن منطقياً، العقدة السابقة (الأب) موجودة <strong>"بالأعلى"</strong>.</li>
                                            <li>نحفظ الحرف <code dir="ltr" className="font-mono text-rose-600 mx-1">'D'</code> في السلسلة النصية، ثم نعكس الحركة لغوياً (نصعد صفاً واحداً للأعلى <span dir="ltr" className="font-mono mx-1">r -= 1</span>) لنقف عند الأب.</li>
                                            <li>نكرر هذه العملية (قراءة الحرف → تخزينه → عكس الاتجاه للوصول للأب) حتى تصبح إحداثياتنا هي إحداثيات البداية <span dir="ltr" className="font-mono mx-1">(A)</span>.</li>
                                            <li className="text-emerald-700 font-bold bg-emerald-50 p-2 rounded mt-2 border border-emerald-100"><strong>اللمسة الأخيرة:</strong> لأننا مشينا وتتبعنا المسار من النهاية (B) للبداية (A)، فالسلسلة النصية للحروف التي جمعناها مقلوبة. نقوم بتشغيل أمر <code dir="ltr" className="font-mono text-[11px] bg-white px-1 rounded border mx-1">reverse()</code> عليها ليصبح المسار صحيحاً ومقروءاً من البداية للنهاية.</li>
                                        </ul>
                                    </div>
                                </div>

                                {/* 5. الجواب النهائي */}
                                <div className="bg-slate-800 text-white p-4 rounded shadow-sm border border-slate-700">
                                    <h3 className="font-bold text-emerald-400 mb-3 border-b border-slate-600 pb-2">الاستنتاج والطباعة (Output)</h3>
                                    <div className="flex flex-col space-y-3 text-xs font-mono" dir="ltr">
                                        <div className="flex flex-col sm:flex-row gap-2 bg-slate-900 p-2 rounded border border-slate-700">
                                            <span className="text-rose-400 font-bold w-48">if (dist[B] == -1)</span>
                                            <span className="text-slate-400"><i className="fa-solid fa-arrow-right mr-2 text-slate-500"></i> Path not found. Print "NO"</span>
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-2 bg-slate-900 p-2 rounded border border-slate-700">
                                            <span className="text-emerald-400 font-bold w-48">else</span>
                                            <span className="text-slate-400"><i className="fa-solid fa-arrow-right mr-2 text-slate-500"></i> Print "YES", then dist[B], then the reversed path string.</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderVisualizer = () => {
                const currentStep = bfsStepsRef.current[bfsStepIdx];
                const s = currentStep.state;

                return (
                    <div className="flex flex-col lg:flex-row h-full bg-slate-100 fade-in overflow-hidden">
                        <div className="w-full lg:w-1/3 bg-white border-l border-slate-200 shadow-lg z-20 flex flex-col">
                            <div className="p-3 bg-slate-800 text-white border-b border-slate-700">
                                <h2 className="text-sm font-bold">التتبع البصري التفاعلي</h2>
                                <p className="text-[10px] text-slate-400">انقر لتتقدم خطوة بخطوة وتفهم ما يجري.</p>
                            </div>
                            
                            <div className="p-4 flex-1 overflow-y-auto space-y-4">
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-slate-800 mb-1 border-b border-slate-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-check-circle text-emerald-600"></i> ماذا حدث للتو؟
                                    </h3>
                                    <p className="text-xs text-slate-700 leading-relaxed mt-2">{currentStep.happened}</p>
                                </div>

                                <div className="bg-indigo-50 border border-indigo-200 p-3 rounded relative shadow-sm">
                                    <h3 className="font-bold text-xs text-indigo-900 mb-1 border-b border-indigo-200 pb-1 flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left text-indigo-600"></i> ماذا سيحدث الآن؟
                                    </h3>
                                    <p className="text-xs text-indigo-800 leading-relaxed mt-2">{currentStep.next}</p>
                                </div>
                            </div>

                            <div className="p-4 bg-slate-50 border-t border-slate-200">
                                <button 
                                    onClick={() => setBfsStepIdx(Math.min(bfsStepsRef.current.length - 1, bfsStepIdx + 1))} 
                                    disabled={bfsStepIdx === bfsStepsRef.current.length - 1}
                                    className="w-full py-3 rounded bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold text-sm shadow transition flex items-center justify-center gap-2"
                                >
                                    {bfsStepIdx === bfsStepsRef.current.length - 1 ? 'انتهى التنفيذ' : 'تنفيذ الخطوة التالية'}
                                    {bfsStepIdx < bfsStepsRef.current.length - 1 && <i className="fa-solid fa-play text-xs"></i>}
                                </button>
                                
                                <div className="flex justify-between mt-3">
                                    <button onClick={() => setBfsStepIdx(0)} disabled={bfsStepIdx === 0} className="text-xs text-slate-500 hover:text-slate-800 transition disabled:opacity-50 flex items-center gap-1">
                                        <i className="fa-solid fa-rotate-right"></i> إعادة من البداية
                                    </button>
                                    <span className="text-xs font-mono text-slate-400 bg-slate-200 px-2 py-0.5 rounded">
                                        خطوة {bfsStepIdx + 1} / {bfsStepsRef.current.length}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 p-4 flex flex-col items-center justify-center bg-slate-100 overflow-y-auto">
                            <div className="bg-white p-6 rounded shadow border border-slate-200 mb-6" dir="ltr">
                                {INITIAL_GRID.map((row, r) => (
                                    <div key={`r${r}`} className="flex">
                                        {row.split('').map((char, c) => {
                                            let isWall = char === '#';
                                            let isStart = r === START.r && c === START.c;
                                            let isEnd = r === END.r && c === END.c;
                                            let isVisited = s.v[r][c];
                                            let isQueue = s.q.some(item => item.r === r && item.c === c);
                                            let isCurrent = s.c && s.c.r === r && s.c.c === c;
                                            let isPath = s.p.some(item => item.r === r && item.c === c);

                                            let classes = "w-8 h-8 md:w-10 md:h-10 m-px rounded-sm flex items-center justify-center font-bold text-xs transition-all duration-200 grid-cell-visual ";
                                            
                                            if (isWall) classes += "bg-slate-700 text-slate-700 ";
                                            else {
                                                if (isPath) classes += "bg-emerald-500 text-white z-10 shadow-sm scale-105 ";
                                                else if (isCurrent) classes += "bg-yellow-400 text-yellow-900 border-2 border-yellow-500 z-10 scale-110 ";
                                                else if (isQueue) classes += "bg-indigo-300 text-white border border-indigo-400 ";
                                                else if (isVisited) classes += "bg-slate-100 text-slate-300 ";
                                                else classes += "bg-white border border-slate-200 text-slate-300 ";
                                            }

                                            let content = "";
                                            if (isStart) content = "A";
                                            else if (isEnd) content = "B";

                                            return <div key={`c${r}${c}`} className={classes}>{content}</div>;
                                        })}
                                    </div>
                                ))}
                            </div>

                            <div className="w-full max-w-md bg-white p-3 rounded shadow border border-slate-200" dir="ltr">
                                <h4 className="text-slate-500 font-bold mb-2 text-[10px] uppercase tracking-wider border-b pb-1">Queue (طابور الانتظار)</h4>
                                <div className="flex gap-1 overflow-x-auto min-h-[32px] items-center">
                                    {s.q.length === 0 ? (
                                        <span className="text-slate-400 text-xs italic">Empty</span>
                                    ) : (
                                        s.q.map((item, idx) => (
                                            <div key={idx} className="bg-indigo-50 text-indigo-700 border border-indigo-200 px-1.5 py-0.5 rounded text-xs font-mono font-bold shrink-0">
                                                ({item.r},{item.c})
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderCode = () => {
                const codeSegments = [
                    {
                        title: "1. الإعداد وقراءة المدخلات",
                        desc: "هذا الجزء يتضمن المكاتب الأساسية ويهيئ سرعة الإدخال/الإخراج. يقرأ أبعاد المتاهة (n و m) ثم ينشئ مصفوفة من السلاسل النصية (vector<string>) ليخزن فيها المتاهة سطراً بسطر تماماً كما أدخلها المستخدم.",
                        code: `#include <iostream>\n#include <vector>\n#include <string>\n#include <queue>\n#include <utility>\n#include <algorithm>\nusing namespace std;\n\nint main() {\n    ios::sync_with_stdio(false);\n    cin.tie(nullptr);\n    int n, m;\n    cin >> n >> m;\n    vector<string> grid(n);\n    for (int i = 0; i < n; i++) cin >> grid[i];`
                    },
                    {
                        title: "2. البحث عن نقطتي البداية والنهاية",
                        desc: "هنا يقوم الكمبيوتر بعملية مسح (حلقتين متداخلتين) للبحث في كل خلية. إذا وجد حرف 'A' يحفظ إحداثياته في المتغير A، وإذا وجد 'B' يحفظها في المتغير B، ليعرف من أين يبدأ وإلى أين يتجه.",
                        code: `    pair<int,int> A{-1,-1}, B{-1,-1};\n    for (int i = 0; i < n; i++) {\n        for (int j = 0; j < m; j++) {\n            if (grid[i][j] == 'A') A = {i, j};\n            if (grid[i][j] == 'B') B = {i, j};\n        }\n    }`
                    },
                    {
                        title: "3. تجهيز أدوات خوارزمية BFS",
                        desc: "يقوم بتعريف مصفوفة المسافات (dist) وملئها بـ -1 (أي لم تزار بعد). ويعرف مصفوفة الاتجاهات (parDir) لحفظ الحروف. يضع نقطة البداية A في الطابور ويجعل مسافتها 0. كما يجهز مصفوفات الحركات الأربعة (أعلى، أسفل، يسار، يمين).",
                        code: `    vector<vector<int>> dist(n, vector<int>(m, -1));\n    vector<vector<char>> parDir(n, vector<char>(m, 0));\n    queue<pair<int,int>> q;\n    dist[A.first][A.second] = 0;\n    q.push(A);\n\n    // Directions: (dr, dc, moveChar)\n    const int dr[4] = {-1, 1, 0, 0};\n    const int dc[4] = {0, 0, -1, 1};\n    const char mv[4] = {'U', 'D', 'L', 'R'};`
                    },
                    {
                        title: "4. حلقة الاستكشاف (التتبع الفعلي)",
                        desc: "هذه هي قلب الخوارزمية. تستمر طالما الطابور ليس فارغاً. تسحب خلية، تفحص جيرانها الأربعة. إذا كان الجار داخل حدود المتاهة، وليس جداراً (#)، ولم يزر من قبل (!= -1)، فإنه يضيفه للطابور، يزود المسافة بواحد، ويسجل الحرف الذي أتى منه.",
                        code: `    while (!q.empty()) {\n        auto [r, c] = q.front(); q.pop();\n        for (int k = 0; k < 4; k++) {\n            int nr = r + dr[k];\n            int nc = c + dc[k];\n            if (nr < 0 || nr >= n || nc < 0 || nc >= m) continue;\n            if (grid[nr][nc] == '#') continue;\n            if (dist[nr][nc] != -1) continue;\n            dist[nr][nc] = dist[r][c] + 1;\n            parDir[nr][nc] = mv[k];\n            q.push({nr, nc});\n        }\n    }`
                    },
                    {
                        title: "5. التحقق من الوصول وطباعة المسافة",
                        desc: "بعد انتهاء البحث، ينظر إلى مسافة الهدف (B). إذا ظلت -1 فهذا يعني أنه لم يجد طريقاً مستمراً (محاصرة بجدران)، فيطبع NO. أما إذا تغيرت، يطبع YES ويطبع المسافة التي وصل إليها.",
                        code: `    if (dist[B.first][B.second] == -1) {\n        cout << "NO\\n";\n        return 0;\n    }\n    cout << "YES\\n";\n    cout << dist[B.first][B.second] << "\\n";`
                    },
                    {
                        title: "6. بناء المسار العكسي وطباعته",
                        desc: "يبدأ من عقدة النهاية (B) ويتراجع خطوة بخطوة للوراء حتى يصل للبداية (A). يقرأ الحرف من parDir ويضيفه للنص، ثم يطبق الحركة المعاكسة للعودة للأب. أخيراً يعكس سلسلة الحروف المتجمعة ليصبح المسار مرتباً من البداية للنهاية ويطبعه.",
                        code: `    // Reconstruct path from B back to A\n    string path;\n    int r = B.first, c = B.second;\n    while (!(r == A.first && c == A.second)) {\n        char d = parDir[r][c];\n        path.push_back(d);\n        // Move to parent (reverse the move)\n        if (d == 'U') r += 1;\n        else if (d == 'D') r -= 1;\n        else if (d == 'L') c += 1;\n        else if (d == 'R') c -= 1;\n    }\n    reverse(path.begin(), path.end());\n    cout << path << "\\n";\n\n    return 0;\n}`
                    }
                ];

                return (
                    <div className="flex flex-col h-full bg-slate-50 fade-in overflow-y-auto p-4 text-slate-800">
                        <div className="max-w-6xl mx-auto w-full space-y-4">
                            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm text-center">
                                <h2 className="text-lg font-bold text-slate-800">تفصيل الكود الأصلي والمجزء</h2>
                                <p className="text-xs text-slate-600 mt-1">
                                    الجهة اليسرى تحتوي على الكود الأصلي (دون أي تعديل). الجهة اليمنى تشرح للطالب ما الذي يحلّه هذا الجزء بالتحديد.
                                </p>
                            </div>

                            <div className="space-y-4">
                                {codeSegments.map((seg, idx) => (
                                    <div key={idx} className="flex flex-col md:flex-row bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
                                        
                                        {/* الجانب الأيمن: الشرح العربي */}
                                        <div className="w-full md:w-5/12 bg-slate-50 p-4 border-b md:border-b-0 md:border-l border-slate-200 flex flex-col justify-center">
                                            <h3 className="font-bold text-indigo-800 mb-2 text-sm">{seg.title}</h3>
                                            <p className="text-xs text-slate-700 leading-relaxed">{seg.desc}</p>
                                        </div>
                                        
                                        {/* الجانب الأيسر: الكود الأصلي الإنجليزي (LTR) */}
                                        <div className="w-full md:w-7/12 bg-[#1e1e1e] p-4 overflow-x-auto" dir="ltr">
                                            <pre className="m-0">
                                                <code className="text-xs font-mono text-[#d4d4d4] whitespace-pre" style={{lineHeight: '1.6'}}>
                                                    {seg.code}
                                                </code>
                                            </pre>
                                        </div>

                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-slate-200">
                    <header className="bg-white px-4 py-3 shadow-sm z-30 flex flex-col md:flex-row md:items-center justify-between gap-3 border-b border-slate-200">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-indigo-700 rounded flex items-center justify-center text-white text-sm shadow">
                                <i className="fa-solid fa-code"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-bold text-slate-800 leading-tight">Labyrinth</h1>
                                <p className="text-slate-500 text-[10px] font-semibold">تفكيك وشرح الخوارزمية المنهجي</p>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded border border-slate-200 gap-1 overflow-x-auto text-xs shadow-inner">
                            {['problem', 'grid', 'strategy', 'visualizer', 'code'].map((tabKey, idx) => {
                                const labels = ["1. المسألة الأصلية", "2. تكوين الشبكة", "3. استراتيجية الحل", "4. التتبع البصري", "5. تفصيل الكود"];
                                return (
                                    <button 
                                        key={tabKey}
                                        onClick={() => setActiveTab(tabKey)} 
                                        className={`px-3 py-1.5 rounded font-bold transition-all whitespace-nowrap ${activeTab === tabKey ? 'bg-white text-indigo-800 shadow border border-slate-200' : 'text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        {labels[idx]}
                                    </button>
                                )
                            })}
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden">
                        {activeTab === 'problem' && renderProblem()}
                        {activeTab === 'grid' && renderGridFormation()}
                        {activeTab === 'strategy' && renderStrategy()}
                        {activeTab === 'visualizer' && renderVisualizer()}
                        {activeTab === 'code' && renderCode()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LabyrinthApp />);
    </script>
</body>
</html>
